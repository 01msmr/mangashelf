<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Register</title>
    <script src="/static/js/scale.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="register-corner">
    <span id="already-have-label" class="corner-label"></span>
    <a href="/login.html" class="btn btn-ghost btn-sm" id="login-link"></a>
</div>
<div class="auth-page">
    <div class="hint-aside-row">
        <div class="auth-card">
            <div class="auth-title" id="register-title"></div>
            <div class="auth-subtitle" id="register-subtitle"></div>
            <div class="error-spacer"><div id="error-box" class="auth-error" style="display:none"></div></div>
            <div class="auth-form">
                <div class="form-group">
                    <label class="form-label" id="label-username"></label>
                    <input type="text" id="username" class="form-input" autocomplete="username" autocapitalize="none">
                </div>
                <!-- Shared PIN module (makePinField) — step 1: PIN, step 2: confirm -->
                <div id="reg-step"></div>
            </div>
        </div>
        <div class="hint text-muted" id="hint-aside">
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/pin.js"></script>
<script>
const errorBox = document.getElementById('error-box');
let firstPin = '';

async function applyTranslations() {
    await Lang.load();
    document.getElementById('already-have-label').textContent = Lang.t('register.alreadyHave');
    document.getElementById('login-link').textContent         = Lang.t('register.login');
    document.getElementById('register-title').textContent     = Lang.t('register.title');
    document.getElementById('register-subtitle').textContent  = Lang.t('register.subtitle');
    document.getElementById('label-username').textContent     = Lang.t('register.usernameLabel');
    document.getElementById('hint-aside').innerHTML = `
        <p><strong>${Lang.t('register.usernameLabel')}</strong><br>${Lang.t('register.hintUsername')}</p>
        <p><strong>PIN</strong><br>${Lang.t('register.hintPin')}</p>
        <p>${Lang.t('register.hintCredit')}</p>
    `;
}

// Step 1: choose PIN (reuses the shared makePinField module — keyboard built in)
function showStep1() {
    const step = document.getElementById('reg-step');
    const pf = makePinField(step, Lang.t('register.pinLabel'), 4);
    const obs = new MutationObserver(() => {
        if (pf.getValue().length === 4) {
            obs.disconnect();
            firstPin = pf.getValue();
            setTimeout(showStep2, 150);
        }
    });
    obs.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
}

// Step 2: confirm PIN, then register
function showStep2() {
    const step = document.getElementById('reg-step');
    const pf = makePinField(step, Lang.t('register.confirmPinLabel'), 4);
    let busy = false;
    const obs = new MutationObserver(async () => {
        if (busy || pf.getValue().length !== 4) return;
        busy = true;
        const pin = pf.getValue();
        const username = document.getElementById('username').value.trim();
        try {
            await API.post('/api/auth/register', { username, pin: firstPin, pin_confirm: pin });
            window.location.href = '/index.html';
        } catch (err) {
            showError(errorBox, err.detail || Lang.t('register.btn'));
            obs.disconnect();
            setTimeout(showStep1, 150);   // start over at the PIN step
        }
    });
    obs.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
}

applyTranslations().then(showStep1);
</script>
</body>
</html>

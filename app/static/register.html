<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="register-corner">
    <span id="already-have-label" style="font-size:13px;color:var(--text-muted);margin-right:10px"></span>
    <a href="/login.html" class="btn btn-ghost btn-sm" id="login-link"></a>
</div>
<div class="auth-page" style="min-height:100vh">
    <div class="hint-aside-row">
        <div class="auth-card">
            <div class="auth-title" id="register-title"></div>
            <div class="auth-subtitle" id="register-subtitle"></div>
            <div class="error-spacer"><div id="error-box" class="auth-error" style="display:none"></div></div>
            <div class="auth-form">
                <div class="form-group">
                    <label class="form-label" id="label-username"></label>
                    <input type="text" id="username" class="form-input" autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label class="form-label" id="label-pin"></label>
                    <div class="input-with-btn">
                        <input type="password" id="pin" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                        <button type="button" id="btn-numpad-pin" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label" id="label-confirm-pin"></label>
                    <div class="input-with-btn">
                        <input type="password" id="pin-confirm" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                        <button type="button" id="btn-numpad-pin-confirm" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" id="btn-register"></button>
            </div>
        </div>
        <div class="hint text-muted" id="hint-aside">
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
const errorBox = document.getElementById('error-box');

async function applyTranslations() {
    await Lang.load();
    document.getElementById('already-have-label').textContent = Lang.t('register.alreadyHave');
    document.getElementById('login-link').textContent         = Lang.t('register.login');
    document.getElementById('register-title').textContent     = Lang.t('register.title');
    document.getElementById('register-subtitle').textContent  = Lang.t('register.subtitle');
    document.getElementById('label-username').textContent     = Lang.t('register.usernameLabel');
    document.getElementById('label-pin').textContent          = Lang.t('register.pinLabel');
    document.getElementById('label-confirm-pin').textContent  = Lang.t('register.confirmPinLabel');
    document.getElementById('btn-register').textContent       = Lang.t('register.btn');
    document.getElementById('hint-aside').innerHTML = `
        <p><strong>${Lang.t('register.usernameLabel')}</strong><br>${Lang.t('register.hintUsername')}</p>
        <p><strong>PIN</strong><br>${Lang.t('register.hintPin')}</p>
        <p>${Lang.t('register.hintCredit')}</p>
    `;
}

attachNumpad(document.getElementById('pin'), document.getElementById('btn-numpad-pin'), { keepFocus: true });
attachNumpad(document.getElementById('pin-confirm'), document.getElementById('btn-numpad-pin-confirm'), { keepFocus: true });

document.getElementById('btn-register').addEventListener('click', async () => {
    hideError(errorBox);
    const username    = document.getElementById('username').value.trim();
    const pin         = document.getElementById('pin').value.trim();
    const pin_confirm = document.getElementById('pin-confirm').value.trim();
    try {
        await API.post('/api/auth/register', { username, pin, pin_confirm });
        window.location.href = '/index.html';
    } catch (err) {
        showError(errorBox, err.detail || Lang.t('register.btn'));
    }
});

applyTranslations();
</script>
</body>
</html>

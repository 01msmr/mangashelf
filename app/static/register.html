<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page" style="min-height:100vh">
    <div class="hint-aside-row">
        <div class="auth-card">
            <div class="auth-title">Create Account</div>
            <div class="auth-subtitle">Letters and numbers only, min. 3 characters</div>
            <div class="error-spacer"><div id="error-box" class="auth-error" style="display:none"></div></div>
            <div class="auth-form">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-input" autocomplete="username" autocapitalize="none">
                </div>
                <div class="form-group">
                    <label class="form-label">PIN (4 digits)</label>
                    <div class="input-with-btn">
                        <input type="password" id="pin" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                        <button type="button" id="btn-numpad-pin" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" title="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm PIN</label>
                    <div class="input-with-btn">
                        <input type="password" id="pin-confirm" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                        <button type="button" id="btn-numpad-pin-confirm" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" title="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" id="btn-register">Create Account</button>
            </div>
        </div>
        <div class="hint text-muted">
            <p><strong>Username</strong><br>Letters and numbers only, min. 3 characters</p>
            <p><strong>PIN</strong><br>4-digit number you'll use to log in</p>
            <p>10.00 € entry credit is added automatically.</p>
        </div>
    </div>
    <div class="auth-register-card">
        Already have an account? <a href="/login.html" class="btn btn-ghost btn-sm">Log in</a>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
const errorBox = document.getElementById('error-box');

attachNumpad(document.getElementById('pin'), document.getElementById('btn-numpad-pin'), { keepFocus: true });
attachNumpad(document.getElementById('pin-confirm'), document.getElementById('btn-numpad-pin-confirm'), { keepFocus: true });

document.getElementById('btn-register').addEventListener('click', async () => {
    hideError(errorBox);
    const username    = document.getElementById('username').value.trim();
    const pin         = document.getElementById('pin').value.trim();
    const pin_confirm = document.getElementById('pin-confirm').value.trim();
    try {
        await API.post('/api/auth/register', { username, pin, pin_confirm });
        window.location.href = '/index.html';
    } catch (err) {
        showError(errorBox, err.detail || 'Registration failed.');
    }
});
</script>
</body>
</html>

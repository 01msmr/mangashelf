<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="list-page">
        <div class="list-header">
            <div class="search-form" style="position:relative;display:flex;align-items:center">
                <input type="text" id="search" class="form-input search-input" placeholder="Search for books" autofocus style="padding-right:36px">
                <button id="btn-clear-search" type="button" class="btn btn-ghost btn-sm" tabindex="-1"
                        style="display:none;position:absolute;right:4px">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="btn btn-ghost btn-sm" id="btn-search">Search</button>
            <label class="available-filter-label" id="chk-available-label">
                <input type="checkbox" id="chk-available"> Available
            </label>
            <a id="btn-add" href="/admin/add-book.html" class="btn btn-ghost btn-sm" style="display:none;margin-left:auto">
                <i class="fa-solid fa-plus"></i> <span id="btn-add-label">Add book</span>
            </a>
        </div>
        <div id="book-list" class="book-list">
            <div class="empty-state" id="initial-loading">Loading…</div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function starsHtml(avg) {
    if (!avg) return '';
    const n = Math.round(avg);
    const s = Array.from({length: 9}, (_, i) => i < n ? '★' : '☆');
    const gap = '<span style="display:inline-block;width:.22em"></span>';
    return s.slice(0,3).join('') + gap + s.slice(3,6).join('') + gap + s.slice(6,9).join('');
}

let currentUser = null;

async function init() {
    await Lang.load();
    currentUser = await initPage().catch(() => null);
    if (!currentUser) return;
    if (currentUser.is_admin) document.getElementById('btn-add').style.display = 'inline-flex';

    document.getElementById('btn-search').textContent = Lang.t('search.btn');
    document.getElementById('search').placeholder = Lang.t('search.placeholder');
    document.getElementById('btn-add-label').textContent = Lang.t('addBook.addBtn');
    const chkLabel = document.getElementById('chk-available-label');
    if (chkLabel) chkLabel.lastChild.textContent = ' ' + Lang.t('book.available');

    const urlQ = new URLSearchParams(location.search).get('q') || '';
    if (urlQ) document.getElementById('search').value = urlQ;
    loadBooks(urlQ);
}

/* ── Book list ──────────────────────────────────────────────── */
async function loadBooks(q = '') {
    const list = document.getElementById('book-list');
    const availOnly = document.getElementById('chk-available').checked;
    list.innerHTML = `<div class="empty-state">${Lang.t('empty.loading')}</div>`;
    try {
        const books = await API.get(`/api/books?q=${encodeURIComponent(q)}&available=${availOnly}`);
        if (!books.length) {
            list.innerHTML = `<div class="empty-state">${Lang.t('empty.noBooks')}</div>`;
            return;
        }
        list.innerHTML = books.map(b => renderBook(b)).join('');

        // Attach admin mark-broken handlers
        if (currentUser.is_admin) {
            books.forEach(b => {
                const btn = document.getElementById(`btn-broken-${b.id}`);
                if (btn) btn.addEventListener('click', () => markBroken(b.id, b.isbn));
            });
        }
    } catch (err) {
        if (handleAuthError(err)) return;
        list.innerHTML = `<div class="empty-state">${esc(err.detail || Lang.t('empty.noBooks'))}</div>`;
    }
}

function renderBook(b) {
    const cover = b.cover_path
        ? `<img src="/static/${esc(b.cover_path)}" alt="" class="be-cover-img">`
        : `<div class="cover-placeholder cover-sm"><i class="fa-solid fa-book fa-flip-horizontal cover-icon-sm"></i></div>`;

    const starsRow = b.avg_rating
        ? `<div class="be-stars">
               <span class="rating-badge" role="img" aria-label="Rating ${Math.round(b.avg_rating)} of 9">${starsHtml(b.avg_rating)}</span>
           </div>`
        : '';

    const badge = b.available > 0
        ? `<span class="status-badge status-available">${Lang.t('book.available')}</span>`
        : `<span class="status-badge status-loaned">${Lang.t('book.allLoaned')}</span>`;

    let actionBtn = '';
    let borrowHint = '';
    if (b.user_loan_id) {
        actionBtn = `<a href="/return.html?loan_id=${b.user_loan_id}" class="btn btn-primary btn-sm">${Lang.t('book.return')}</a>`;
    } else if (b.available > 0) {
        if (b.borrow_allowed === false) {
            borrowHint = b.borrow_reason === 'limit_reached'
                ? Lang.t('book.loanLimit')
                : Lang.t('book.balanceLow');
            actionBtn = `<button class="btn btn-primary btn-sm" disabled>${Lang.t('book.borrow')}</button>`;
        } else {
            actionBtn = `<button onclick="openBorrow(${b.id}, '${esc(b.isbn)}')" class="btn btn-primary btn-sm">${Lang.t('book.borrow')}</button>`;
        }
    }

    const returnDate = fmtDate(b.user_loan_due || b.projected_due);
    const balance    = currentUser.guthaben != null ? currentUser.guthaben.toFixed(2) + ' €' : '—';
    const loanRate   = b.loan_rate != null ? b.loan_rate.toFixed(2) + ' €' : '—';

    let adminRow = '';
    if (currentUser.is_admin && b.loaned > 0) {
        // show borrowers for admins
        const borrowerList = b.borrowers && b.borrowers.length
            ? b.borrowers.map(n => esc(n)).join(', ')
            : '';
        if (borrowerList) adminRow = `<div class="be-borrowers">${borrowerList}</div>`;
    }

    let brokenBtn = '';
    if (currentUser.is_admin) {
        brokenBtn = `<button class="btn btn-ghost btn-sm be-broken-btn" id="btn-broken-${b.id}"
                             title="${Lang.t('book.markBroken')}" style="font-size:var(--text-xs)">
                         <i class="fa-solid fa-triangle-exclamation"></i>
                     </button>`;
    }

    return `
        <div class="be" id="be-${b.id}">
            <div class="be-main">
                <div class="be-cover">${cover}</div>
                <div class="be-body">
                    ${starsRow}
                    <div class="be-title">${esc(b.title)}</div>
                    <div class="be-author">${esc(b.author || '')}</div>
                    ${adminRow}
                </div>
                <div class="be-side">
                    ${badge}
                    <div class="be-borrow-hint">${borrowHint}</div>
                    ${actionBtn}
                    ${brokenBtn}
                </div>
            </div>
            <div class="be-strip">
                <div class="ls-item">
                    <span class="ls-label">${Lang.t('book.loanFee')}</span>
                    <span class="ls-value">${loanRate}</span>
                </div>
                <div class="ls-item">
                    <span class="ls-label">${Lang.t('book.balance')}</span>
                    <span class="ls-value">${balance}</span>
                </div>
                <div class="ls-item">
                    <span class="ls-label">${Lang.t('book.returnDate')}</span>
                    <span class="ls-value${b.user_loan_due ? '' : ' ls-value-dim'}">${returnDate}</span>
                </div>
            </div>
            <div class="be-broken-form" id="broken-form-${b.id}" style="display:none"></div>
            <div class="be-borrow-drop" id="borrow-form-${b.id}" style="display:none"></div>
        </div>`;
}

async function openBorrow(bookId, isbn) {
    const formEl = document.getElementById(`borrow-form-${bookId}`);
    const wasOpen = formEl.hasAttribute('data-open');

    // Close any open borrow forms
    document.querySelectorAll('.be-borrow-drop[data-open]').forEach(f => {
        delete f.dataset.open;
        f.style.display = 'none';
    });

    if (wasOpen) return; // clicked again → toggled closed

    formEl.setAttribute('data-open', '');
    formEl.style.display = 'block';
    formEl.innerHTML = `<div class="be-borrow-loading text-muted">${Lang.t('empty.loading')}</div>`;

    try {
        const info = await API.get(`/api/borrow/${encodeURIComponent(isbn)}`);
        const feeVal = info.is_donor ? (Lang.t('borrow.free') || 'Free') : (info.default_rate + ' €');
        let adminBrokenHtml = '';
        if (currentUser.is_admin) {
            adminBrokenHtml = `<button class="btn btn-ghost btn-sm" id="bd-broken-${bookId}" style="opacity:.7">
                <i class="fa-solid fa-triangle-exclamation"></i> ${Lang.t('book.markBroken')}
            </button>`;
        }
        formEl.innerHTML = `
            <div class="borrow-drop">
                <div class="borrow-drop-strip">
                    <div class="ls-item">
                        <span class="ls-label">${Lang.t('book.loanFee')}</span>
                        <span class="ls-value">${feeVal}</span>
                    </div>
                    <div class="ls-item">
                        <span class="ls-label">${Lang.t('book.balance')}</span>
                        <span class="ls-value">${info.guthaben.toFixed(2)} €</span>
                    </div>
                    <div class="ls-item">
                        <span class="ls-label">${Lang.t('book.returnDate')}</span>
                        <span class="ls-value">${info.due_date}</span>
                    </div>
                </div>
                <div class="borrow-drop-btns">
                    <button class="btn btn-primary btn-sm" id="bd-confirm-${bookId}">${Lang.t('borrow.confirm')}</button>
                    <button class="btn btn-ghost btn-sm" id="bd-cancel-${bookId}">${Lang.t('borrow.cancelBtn') || Lang.t('return.cancelBtn')}</button>
                    ${adminBrokenHtml}
                </div>
                <div class="fetch-status" id="bd-msg-${bookId}" style="display:none;margin-top:6px"></div>
            </div>`;

        document.getElementById(`bd-cancel-${bookId}`).addEventListener('click', () => {
            formEl.removeAttribute('data-open');
            formEl.style.display = 'none';
        });

        document.getElementById(`bd-confirm-${bookId}`).addEventListener('click', async () => {
            const btn = document.getElementById(`bd-confirm-${bookId}`);
            const msgEl = document.getElementById(`bd-msg-${bookId}`);
            btn.disabled = true;
            try {
                const res = await API.post(`/api/borrow/${encodeURIComponent(isbn)}`, { loan_rate: info.default_rate });
                msgEl.className = 'fetch-status text-success';
                msgEl.textContent = res.message;
                msgEl.style.display = 'block';
                setTimeout(() => loadBooks(searchEl.value), 1800);
            } catch (err) {
                btn.disabled = false;
                msgEl.className = 'fetch-status text-danger';
                msgEl.textContent = err.detail || 'Failed';
                msgEl.style.display = 'block';
            }
        });

        if (currentUser.is_admin) {
            const brokenBtn = document.getElementById(`bd-broken-${bookId}`);
            if (brokenBtn) brokenBtn.addEventListener('click', () => {
                formEl.removeAttribute('data-open');
                formEl.style.display = 'none';
                markBroken(bookId, isbn);
            });
        }
    } catch (err) {
        if (handleAuthError(err)) return;
        formEl.innerHTML = `<div class="text-danger" style="padding:8px 0;font-size:13px">${esc(err.detail || 'Error')}</div>`;
    }
}

async function markBroken(bookId, isbn) {
    const formEl = document.getElementById(`broken-form-${bookId}`);
    if (formEl.style.display !== 'none') { formEl.style.display = 'none'; return; }

    // Fetch copies
    try {
        const book = await API.get(`/api/books/${encodeURIComponent(isbn)}`);
        const opts = book.copies.filter(c => c.status !== 'broken').map(c =>
            `<option value="${c.id}">${Lang.t('book.copyNum')} #${c.copy_num} (${c.status})</option>`
        ).join('');
        if (!opts) { formEl.style.display = 'none'; return; }
        formEl.innerHTML = `
            <div class="be-broken-inner">
                <select id="bc-sel-${bookId}" class="form-input form-select" style="height:36px;font-size:13px;flex:1;min-width:0">${opts}</select>
                <input type="text" id="bc-note-${bookId}" class="form-input" placeholder="${Lang.t('book.noteHint')}" style="height:36px;font-size:13px;flex:1;min-width:0">
                <button class="btn btn-danger btn-sm" id="bc-confirm-${bookId}">${Lang.t('book.markBroken')}</button>
            </div>
            <div class="be-broken-msg text-danger" id="bc-msg-${bookId}" style="display:none;padding:4px 0"></div>`;
        formEl.style.display = 'block';
        document.getElementById(`bc-confirm-${bookId}`).addEventListener('click', async () => {
            const copyId = document.getElementById(`bc-sel-${bookId}`).value;
            const note   = document.getElementById(`bc-note-${bookId}`).value;
            const msgEl  = document.getElementById(`bc-msg-${bookId}`);
            try {
                const res = await API.post(`/api/copies/${copyId}/broken`, { broken_note: note });
                if (res.book_removed) loadBooks(searchEl.value);
                else loadBooks(searchEl.value);
            } catch (err) {
                msgEl.textContent = err.detail || 'Failed';
                msgEl.style.display = 'block';
            }
        });
    } catch (err) {
        if (handleAuthError(err)) return;
    }
}

const searchEl = document.getElementById('search');
document.getElementById('btn-search').addEventListener('click', () => loadBooks(searchEl.value));
document.getElementById('chk-available').addEventListener('change', () => loadBooks(searchEl.value));
searchEl.addEventListener('keydown', e => { if (e.key === 'Enter') loadBooks(searchEl.value); });

const btnClear = document.getElementById('btn-clear-search');
btnClear.addEventListener('click', () => {
    searchEl.value = '';
    btnClear.style.display = 'none';
    loadBooks('');
    searchEl.focus();
});

let searchDebounce;
searchEl.addEventListener('input', () => {
    btnClear.style.display = searchEl.value ? 'block' : 'none';
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => loadBooks(searchEl.value), 300);
});

// Hardware barcode scanner (rapid keypresses → Enter)
async function handleIsbn(isbn) {
    isbn = isbn.trim();
    if (!isbn) return;
    try {
        const res = await API.get(`/api/scan?isbn=${encodeURIComponent(isbn)}`);
        if (res.action === 'borrow')           window.location.href = `/borrow.html?isbn=${encodeURIComponent(isbn)}`;
        else if (res.action === 'return')      window.location.href = `/return.html?loan_id=${res.loan_id}`;
        else if (res.action === 'return_pick') window.location.href = `/return-pick.html?isbn=${encodeURIComponent(isbn)}`;
        else if (res.action === 'add')         window.location.href = `/admin/add-book.html?isbn=${encodeURIComponent(isbn)}`;
    } catch (err) { if (handleAuthError(err)) return; }
}

let scanBuffer = '', scanTimer;
document.addEventListener('keypress', e => {
    if (document.activeElement === searchEl) return;
    if (e.key === 'Enter') {
        if (scanBuffer.length > 5) handleIsbn(scanBuffer);
        scanBuffer = ''; clearTimeout(scanTimer);
    } else {
        scanBuffer += e.key;
        clearTimeout(scanTimer);
        scanTimer = setTimeout(() => { scanBuffer = ''; }, 500);
    }
});

init();
</script>
</body>
</html>

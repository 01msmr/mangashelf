<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="list-page">
        <div class="list-header">
            <div class="search-form">
                <input type="text" id="search" class="form-input search-input" placeholder="Search for books" autofocus style="padding-right:36px">
                <button id="btn-clear-search" type="button" class="btn btn-ghost btn-sm absolute" tabindex="-1"
                        style="display:none;right:4px">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button class="btn btn-ghost btn-sm" id="btn-search">Search</button>
            <label class="available-filter-label" id="chk-available-label">
                <input type="checkbox" id="chk-available"> Available
            </label>
            <a id="btn-add" href="/admin/add-book.html" class="btn btn-ghost btn-sm ml-auto" style="display:none">
                <i class="fa-solid fa-plus"></i> <span id="btn-add-label">Add book</span>
            </a>
        </div>
        <div id="book-list" class="book-list">
            <div class="empty-state" id="initial-loading">Loading…</div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function starsHtml(avg) {
    if (!avg) return '';
    const n = Math.round(avg);
    const s = Array.from({length: 9}, (_, i) => i < n ? '★' : '☆');
    const gap = '<span class="stars-gap"></span>';
    return s.slice(0,3).join('') + gap + s.slice(3,6).join('') + gap + s.slice(6,9).join('');
}

let currentUser = null;

async function init() {
    await Lang.load();
    currentUser = await initPage().catch(() => null);
    if (!currentUser) return;
    if (currentUser.is_admin) document.getElementById('btn-add').style.display = 'inline-flex';

    document.getElementById('btn-search').textContent = Lang.t('search.btn');
    document.getElementById('search').placeholder = Lang.t('search.placeholder');
    document.getElementById('btn-add-label').textContent = Lang.t('addBook.addBtn');
    const chkLabel = document.getElementById('chk-available-label');
    if (chkLabel) chkLabel.lastChild.textContent = ' ' + Lang.t('book.available');

    const urlQ = new URLSearchParams(location.search).get('q') || '';
    if (urlQ) document.getElementById('search').value = urlQ;
    loadBooks(urlQ);
}

/* ── Book list ──────────────────────────────────────────────── */
async function loadBooks(q = '') {
    const list = document.getElementById('book-list');
    const availOnly = document.getElementById('chk-available').checked;
    list.innerHTML = `<div class="empty-state">${Lang.t('empty.loading')}</div>`;
    try {
        const resp = await API.get(`/api/books?q=${encodeURIComponent(q)}&available=${availOnly}`);
        const books = resp.items;
        const newBookDays = resp.new_book_days || 0;
        if (!books.length) {
            list.innerHTML = `<div class="empty-state">${Lang.t('empty.noBooks')}</div>`;
            return;
        }
        list.innerHTML = books.map(b => renderBook(b, newBookDays)).join('');

        // Attach admin mark-broken handlers
        if (currentUser.is_admin) {
            books.forEach(b => {
                const btn = document.getElementById(`btn-broken-${b.id}`);
                if (btn) btn.addEventListener('click', () => markBroken(b.id, b.isbn));
            });
        }

        // Highlight just-added book
        const newIsbn = new URLSearchParams(location.search).get('new');
        if (newIsbn) {
            const el = list.querySelector(`[data-isbn="${CSS.escape(newIsbn)}"]`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('book-new-pulse');
            }
        }
    } catch (err) {
        if (handleAuthError(err)) return;
        list.innerHTML = `<div class="empty-state">${esc(err.detail || Lang.t('empty.noBooks'))}</div>`;
    }
}

function renderBook(b, newBookDays) {
    const isNew = newBookDays > 0 && b.added_at &&
        (Date.now() - new Date(b.added_at).getTime()) < newBookDays * 86400000;
    const newBadge = isNew ? `<span class="be-new-badge">${Lang.t('book.new')}</span>` : '';
    const cover = b.cover_path
        ? `<img src="/static/${esc(b.cover_path)}" alt="" class="be-cover-img">`
        : `<div class="cover-placeholder cover-sm"><i class="fa-solid fa-book fa-flip-horizontal cover-icon-sm"></i></div>`;

    const starsRow = `<div class="be-stars">${newBadge}${b.avg_rating
        ? `<span class="rating-badge" role="img" aria-label="Rating ${Math.round(b.avg_rating)} of 9">${starsHtml(b.avg_rating)}</span>${b.rating_count ? `<span class="text-muted rating-count">${b.rating_count} <i class="fa-solid fa-square-check"></i></span>` : ''}`
        : ''}</div>`;

    const total = b.total_copies || 1;
    const availLabel = total > 1
        ? `${b.available} /${total} ${Lang.t('book.available')}`
        : Lang.t('book.available');
    const badge = b.available > 0
        ? `<span class="status-badge status-available">${availLabel}</span>`
        : `<span class="status-badge status-loaned">${Lang.t('book.allLoaned')}</span>`;

    let actionBtn = '';
    let borrowHint = '';
    if (b.user_loan_id) {
        actionBtn = `<button onclick="openReturn(${b.id}, ${b.user_loan_id})" class="btn btn-primary btn-sm">${Lang.t('book.return')}</button>`;
    } else if (b.available > 0 && b.borrow_allowed !== false) {
        actionBtn = `<button onclick="openBorrow(${b.id}, '${esc(b.isbn)}', ${b.loan_rate || 0.5})" class="btn btn-primary btn-sm">${Lang.t('book.borrow')}</button>`;
    } else {
        const tip = b.available === 0 ? Lang.t('book.reasonNoAvail') : b.borrow_reason === 'account_locked' ? Lang.t('book.reasonLocked') : b.borrow_reason === 'balance_low' ? Lang.t('book.balanceLow') : Lang.t('book.loanLimit');
        actionBtn = `<button class="btn btn-primary btn-sm opacity-60" disabled data-tip="${esc(tip)}">${Lang.t('book.borrow')}</button>`;
    }

    let adminRow = '';

    let brokenBtn = '';
    if (currentUser.is_admin) {
        brokenBtn = `<button class="btn btn-ghost btn-sm be-broken-btn text-xs" id="btn-broken-${b.id}"
                             data-tip="${Lang.t('book.markBroken')}">
                         <i class="fa-solid fa-triangle-exclamation"></i>
                     </button>`;
    }

    return `
        <div class="be" id="be-${b.id}" data-isbn="${esc(b.isbn)}">
            <div class="be-main">
                <div class="be-cover${b.available === 0 ? ' opacity-60' : ''}">${cover}</div>
                <div class="be-body">
                    ${starsRow}
                    <div class="be-title">${esc(b.title)}${b.subtitle ? `<span class="be-subtitle"> — ${esc(b.subtitle)}</span>` : ''}</div>
                    ${adminRow}
                </div>
                <div class="be-side">
                    <div class="flex items-center gap-1">${brokenBtn}${badge}</div>
                </div>
                <div class="be-author-row">
                    <div class="be-author">${esc(b.author || '')}</div>
                    <div class="be-action-wrap${b.available === 0 ? ' opacity-60' : ''}" id="be-action-${b.id}">${actionBtn}</div>
                </div>
            </div>
            <div class="be-broken-form" id="broken-form-${b.id}" style="display:none"></div>
        </div>`;
}

function openBorrow(bookId, isbn, loanRate) {
    const wrap = document.getElementById(`be-action-${bookId}`);
    if (!wrap) return;
    const origBtn = wrap.firstElementChild;
    if (!origBtn) return;

    origBtn.style.width = origBtn.offsetWidth + 'px';
    origBtn.textContent = Lang.t('borrow.cancelBtn');
    origBtn.classList.replace('btn-primary', 'btn-ghost');
    origBtn.onclick = null;

    // Rate picker: € [ ½ | 1 | 1½ | 2 ]
    const rates  = [0.5, 1, 1.5, 2];
    const labels = ['½', '1', '1½', '2'];
    const pickerWrap = document.createElement('div');
    pickerWrap.className = 'rate-seg-wrap';
    const picker = document.createElement('div');
    picker.className = 'rate-seg';
    picker.innerHTML = rates.map((r, i) =>
        `<button class="rate-seg-btn${r === loanRate ? ' active' : ''}" data-rate="${r}">${labels[i]}</button>`
    ).join('');
    pickerWrap.innerHTML = '<span class="rate-seg-euro">€</span>';
    pickerWrap.appendChild(picker);
    wrap.insertBefore(pickerWrap, origBtn);

    function restore() {
        pickerWrap.remove();
        origBtn.style.width = '';
        origBtn.textContent = Lang.t('book.borrow');
        origBtn.classList.replace('btn-ghost', 'btn-primary');
        origBtn.onclick = () => openBorrow(bookId, isbn, loanRate);
        origBtn.disabled = false;
    }

    origBtn.addEventListener('click', restore);

    picker.querySelectorAll('.rate-seg-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const rate = parseFloat(btn.dataset.rate);
            picker.querySelectorAll('.rate-seg-btn').forEach(b => b.disabled = true);
            origBtn.disabled = true;
            try {
                await API.post(`/api/borrow/${encodeURIComponent(isbn)}`, { loan_rate: String(rate) });
                setTimeout(() => loadBooks(searchEl.value), 1000);
            } catch (err) {
                if (handleAuthError(err)) return;
                restore();
                const errEl = document.createElement('span');
                errEl.className = 'text-danger';
                errEl.style.cssText = 'font-size:12px;margin-left:6px';
                errEl.textContent = err.detail || 'Failed';
                wrap.appendChild(errEl);
            }
        });
    });
}

function openReturn(bookId, loanId) {
    const wrap = document.getElementById(`be-action-${bookId}`);
    if (!wrap) return;
    const origBtn = wrap.firstElementChild;
    if (!origBtn) return;

    origBtn.style.width = origBtn.offsetWidth + 'px';
    origBtn.textContent = Lang.t('borrow.cancelBtn');
    origBtn.classList.replace('btn-primary', 'btn-ghost');
    origBtn.onclick = null;

    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-primary btn-sm';
    confirmBtn.textContent = Lang.t('book.return');
    wrap.insertBefore(confirmBtn, origBtn);

    function restore() {
        confirmBtn.remove();
        origBtn.style.width = '';
        origBtn.textContent = Lang.t('book.return');
        origBtn.classList.replace('btn-ghost', 'btn-primary');
        origBtn.onclick = () => openReturn(bookId, loanId);
        origBtn.disabled = false;
    }

    origBtn.addEventListener('click', restore);

    confirmBtn.addEventListener('click', async () => {
        confirmBtn.disabled = true;
        origBtn.disabled = true;
        try {
            await API.post(`/api/return/${loanId}`);
            setTimeout(() => loadBooks(searchEl.value), 1000);
        } catch (err) {
            if (handleAuthError(err)) return;
            restore();
            const errEl = document.createElement('span');
            errEl.className = 'text-danger';
            errEl.style.cssText = 'font-size:12px;margin-left:6px';
            errEl.textContent = err.detail || 'Failed';
            wrap.appendChild(errEl);
        }
    });
}

async function markBroken(bookId, isbn) {
    const formEl = document.getElementById(`broken-form-${bookId}`);
    if (formEl.style.display !== 'none') { formEl.style.display = 'none'; return; }

    // Fetch copies
    try {
        const book = await API.get(`/api/books/${encodeURIComponent(isbn)}`);
        const opts = book.copies.filter(c => c.status !== 'broken').map(c =>
            `<option value="${c.id}">${Lang.t('book.copyNum')} #${c.copy_num} (${c.status})</option>`
        ).join('');
        if (!opts) { formEl.style.display = 'none'; return; }
        formEl.innerHTML = `
            <div class="be-broken-inner">
                <select id="bc-sel-${bookId}" class="form-input form-select">${opts}</select>
                <input type="text" id="bc-note-${bookId}" class="form-input" placeholder="${Lang.t('book.noteHint')}">
                <button class="btn btn-danger btn-sm" id="bc-confirm-${bookId}">${Lang.t('book.markBroken')}</button>
            </div>
            <div class="be-broken-msg text-danger" id="bc-msg-${bookId}" style="display:none;padding:4px 0"></div>`;
        formEl.style.display = 'block';
        document.getElementById(`bc-confirm-${bookId}`).addEventListener('click', async () => {
            const copyId = document.getElementById(`bc-sel-${bookId}`).value;
            const note   = document.getElementById(`bc-note-${bookId}`).value;
            const msgEl  = document.getElementById(`bc-msg-${bookId}`);
            try {
                const res = await API.post(`/api/copies/${copyId}/broken`, { broken_note: note });
                loadBooks(searchEl.value);
            } catch (err) {
                msgEl.textContent = err.detail || 'Failed';
                msgEl.style.display = 'block';
            }
        });
    } catch (err) {
        if (handleAuthError(err)) return;
    }
}

const searchEl = document.getElementById('search');
document.getElementById('btn-search').addEventListener('click', () => loadBooks(searchEl.value));
document.getElementById('chk-available').addEventListener('change', () => loadBooks(searchEl.value));
searchEl.addEventListener('keydown', e => { if (e.key === 'Enter') loadBooks(searchEl.value); });

const btnClear = document.getElementById('btn-clear-search');
btnClear.addEventListener('click', () => {
    searchEl.value = '';
    btnClear.style.display = 'none';
    loadBooks('');
    searchEl.focus();
});

let searchDebounce;
searchEl.addEventListener('input', () => {
    btnClear.style.display = searchEl.value ? 'block' : 'none';
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => loadBooks(searchEl.value), 300);
});

// Hardware barcode scanner (rapid keypresses → Enter)
async function handleIsbn(isbn) {
    isbn = isbn.trim();
    if (!isbn) return;
    try {
        const res = await API.get(`/api/scan?isbn=${encodeURIComponent(isbn)}`);
        if (res.action === 'borrow')           window.location.href = `/borrow.html?isbn=${encodeURIComponent(isbn)}`;
        else if (res.action === 'return')      window.location.href = `/return.html?loan_id=${res.loan_id}`;
        else if (res.action === 'return_pick') window.location.href = `/return-pick.html?isbn=${encodeURIComponent(isbn)}`;
        else if (res.action === 'add')         window.location.href = `/admin/add-book.html?isbn=${encodeURIComponent(isbn)}`;
    } catch (err) { if (handleAuthError(err)) return; }
}

let scanBuffer = '', scanTimer;
document.addEventListener('keypress', e => {
    if (document.activeElement === searchEl) return;
    if (e.key === 'Enter') {
        if (scanBuffer.length > 5) handleIsbn(scanBuffer);
        scanBuffer = ''; clearTimeout(scanTimer);
    } else {
        scanBuffer += e.key;
        clearTimeout(scanTimer);
        scanTimer = setTimeout(() => { scanBuffer = ''; }, 500);
    }
});

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MangaStore — Phone Scanner</title>
    <style>
        :root {
            --bg:       #0d0d1a;
            --surface:  #1a1a2e;
            --surface-2:#22223a;
            --border:   #2d2d50;
            --primary:  #e63946;
            --primary-hover: #c5303c;
            --primary-dim: rgba(230,57,70,0.15);
            --text:     #f0eef8;
            --text-muted: #8a88a8;
            --success:  #4ade80;
            --danger:   #e63946;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 16px;
            line-height: 1.4;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ── Page shells ─────────────────────────── */
        .page {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
        }
        .page.hidden { display: none; }

        /* ── Prompt screen ───────────────────────── */
        #prompt-screen {
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 32px 28px;
            background: var(--bg);
        }

        .logo {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            margin-bottom: 32px;
        }
        .logo span { color: var(--primary); }

        .scanner-icon {
            width: 96px; height: 96px;
            background: var(--primary-dim);
            border: 2px solid rgba(230,57,70,0.35);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 24px;
            box-shadow: 0 0 40px rgba(230,57,70,0.2);
        }
        .scanner-icon svg {
            width: 52px; height: 52px;
            fill: var(--primary);
        }

        .prompt-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 8px;
        }
        .prompt-msg {
            font-size: 14px;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.6;
            max-width: 260px;
            margin-bottom: 28px;
        }

        .result-box {
            width: 100%; max-width: 320px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 16px;
            display: none;
        }
        .result-box.success {
            background: rgba(74,222,128,0.12);
            border: 1px solid rgba(74,222,128,0.35);
            color: var(--success);
        }
        .result-box.error {
            background: var(--primary-dim);
            border: 1px solid rgba(230,57,70,0.35);
            color: #ff6b78;
        }

        .btn {
            display: flex; align-items: center; justify-content: center;
            width: 100%; max-width: 320px;
            height: 56px;
            font-size: 16px; font-weight: 700;
            border: none; border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.15s, background 0.15s;
        }
        .btn:active { opacity: 0.8; }
        .btn-primary { background: var(--primary); color: #fff; margin-bottom: 10px; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-ghost {
            background: transparent; color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--surface-2); color: var(--text); }

        /* ── Viewfinder screen ───────────────────── */
        #viewfinder-screen {
            background: #000;
        }

        #scanner-video {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .vf-overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px;
        }

        .reticle {
            width: 260px; height: 160px;
            border-radius: 12px;
            border: 2px solid var(--primary);
            box-shadow:
                0 0 0 2000px rgba(0,0,0,0.55),
                0 0 24px rgba(230,57,70,0.4);
            position: relative;
        }
        /* Corner accents */
        .reticle::before, .reticle::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: #fff;
            border-style: solid;
        }
        .reticle::before {
            top: -2px; left: -2px;
            border-width: 3px 0 0 3px;
            border-radius: 12px 0 0 0;
        }
        .reticle::after {
            bottom: -2px; right: -2px;
            border-width: 0 3px 3px 0;
            border-radius: 0 0 12px 0;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan {
            0%   { top: 0;    opacity: 1; }
            90%  { top: 100%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .vf-hint {
            color: rgba(255,255,255,0.85);
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 1px 6px rgba(0,0,0,0.8);
            letter-spacing: 0.3px;
        }

        .btn-close {
            position: absolute;
            bottom: 36px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.85);
            font-size: 14px; font-weight: 600;
            padding: 10px 28px;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(6px);
        }
        .btn-close:active { opacity: 0.7; }
    </style>
</head>
<body>

<!-- Prompt screen -->
<div class="page" id="prompt-screen">
    <div class="logo">Manga<span>Store</span></div>
    <div class="scanner-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 4h2v16H2V4zm4 0h1v16H6V4zm2 0h2v16H8V4zm3 0h1v16h-1V4zm2 0h2v16h-2V4zm3 0h1v16h-1V4zm2 0h2v16h-2V4z"/>
        </svg>
    </div>
    <div class="prompt-title">Phone Scanner</div>
    <div class="prompt-msg">Tap the button below to start your camera and scan a barcode.</div>
    <div class="result-box" id="scan-result"></div>
    <button class="btn btn-primary" id="btn-start">Start Camera</button>
    <a href="/index.html" class="btn btn-ghost">Go to main screen</a>
</div>

<!-- Viewfinder screen -->
<div class="page hidden" id="viewfinder-screen">
    <video id="scanner-video" playsinline autoplay muted></video>
    <div class="vf-overlay">
        <div class="reticle">
            <div class="scan-line"></div>
        </div>
        <div class="vf-hint">Point at a barcode</div>
    </div>
    <button class="btn-close" id="btn-close">✕ Cancel</button>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/zxing-browser.min.js"></script>
<script>
// Handle token login from QR
const params = new URLSearchParams(location.search);
const token = params.get('t');
if (token) {
    API.get(`/api/phone-scan-token?t=${encodeURIComponent(token)}`)
        .then(() => { window.history.replaceState({}, '', '/phone-scan.html'); })
        .catch(() => { window.location.href = '/login.html'; });
}

let codeReader;
const resultEl = document.getElementById('scan-result');

function showResult(msg, type) {
    resultEl.textContent = msg;
    resultEl.className   = 'result-box ' + (type === 'success' ? 'success' : 'error');
    resultEl.style.display = 'block';
    setTimeout(() => { resultEl.style.display = 'none'; }, 3500);
}

function showPrompt() {
    document.getElementById('viewfinder-screen').classList.add('hidden');
    document.getElementById('prompt-screen').classList.remove('hidden');
}

function showViewfinder() {
    document.getElementById('prompt-screen').classList.add('hidden');
    document.getElementById('viewfinder-screen').classList.remove('hidden');
}

async function handleIsbn(isbn) {
    try {
        const res = await API.get(`/api/scan?isbn=${encodeURIComponent(isbn)}`);
        if (res.action === 'borrow') {
            const bRes = await API.post(`/api/borrow/${encodeURIComponent(isbn)}`, {});
            showResult(bRes.message, 'success');
        } else if (res.action === 'return' && res.loan_id) {
            const rRes = await API.post(`/api/return/${res.loan_id}`);
            showResult(rRes.message, 'success');
        } else if (res.action === 'add') {
            showResult(`ISBN ${isbn} not in library — use the main screen to add it.`, 'error');
        } else if (res.action === 'return_pick') {
            showResult('Multiple copies — use the main screen to choose.', 'error');
        }
    } catch (err) {
        if (err.status === 401) { window.location.href = '/login.html'; return; }
        showResult(err.detail || 'Error', 'error');
    }
}

document.getElementById('btn-start').addEventListener('click', async () => {
    showViewfinder();
    const video = document.getElementById('scanner-video');
    const { BrowserMultiFormatReader } = ZXingBrowser;
    codeReader = new BrowserMultiFormatReader();
    try {
        await codeReader.decodeFromVideoDevice(null, video, (result) => {
            if (result) {
                const isbn = result.getText();
                codeReader.reset(); codeReader = null;
                showPrompt();
                handleIsbn(isbn);
            }
        });
    } catch (e) {
        showPrompt();
        showResult('Camera not available', 'error');
    }
});

document.getElementById('btn-close').addEventListener('click', () => {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    showPrompt();
});
</script>
</body>
</html>

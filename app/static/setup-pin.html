<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaStore — Set PIN</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-title">Set Your PIN</div>
        <div class="auth-subtitle">Choose a 4-digit PIN (not 0000)</div>
        <div class="setup-notice">You must set a new PIN before continuing.</div>
        <div style="min-height:44px"><div id="error-box" class="auth-error" style="display:none"></div></div>
        <div class="auth-form">
            <div class="form-group">
                <label class="form-label">New PIN</label>
                <div style="position:relative;display:flex;align-items:center">
                    <input type="password" id="pin" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                    <button type="button" id="btn-numpad-pin" class="btn btn-ghost btn-sm" tabindex="-1" title="Numpad" style="position:absolute;right:4px"><i class="fa-solid fa-keyboard"></i></button>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm PIN</label>
                <div style="position:relative;display:flex;align-items:center">
                    <input type="password" id="pin-confirm" class="form-input" inputmode="none" maxlength="4" style="flex:1;padding-right:36px">
                    <button type="button" id="btn-numpad-pin-confirm" class="btn btn-ghost btn-sm" tabindex="-1" title="Numpad" style="position:absolute;right:4px"><i class="fa-solid fa-keyboard"></i></button>
                </div>
            </div>
            <button class="btn btn-primary btn-block" id="btn-set">Set PIN</button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
const errorBox = document.getElementById('error-box');

attachNumpad(document.getElementById('pin'), document.getElementById('btn-numpad-pin'), { keepFocus: true });
attachNumpad(document.getElementById('pin-confirm'), document.getElementById('btn-numpad-pin-confirm'), { keepFocus: true });

document.getElementById('btn-set').addEventListener('click', async () => {
    hideError(errorBox);
    const pin         = document.getElementById('pin').value.trim();
    const pin_confirm = document.getElementById('pin-confirm').value.trim();
    try {
        await API.post('/api/auth/setup-pin', { pin, pin_confirm });
        window.location.href = '/index.html';
    } catch (err) {
        showError(errorBox, err.detail || 'Failed to set PIN.');
    }
});
</script>
</body>
</html>

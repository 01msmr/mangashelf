<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Set PIN</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="page-center">
    <div class="pin-card">
        <div class="auth-title" id="setup-title" style="margin-bottom:16px"></div>
        <div class="pin-hint" id="setup-notice"></div>
        <div id="pin-step"></div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/pin.js"></script>
<script>
let firstPin = '';

async function applyTranslations() {
    await Lang.load();
    document.getElementById('setup-title').textContent  = Lang.t('setupPin.title');
    document.getElementById('setup-notice').textContent = Lang.t('setupPin.notice');
}

function showStep1() {
    const step = document.getElementById('pin-step');
    const pf = makePinField(step, Lang.t('setupPin.newPinLabel'), 4);

    const keyHandler = e => {
        e.preventDefault(); e.stopPropagation();
        if (/^\d$/.test(e.key) && pf.getValue().length < 4) {
            step.querySelectorAll('.pinpad-key').forEach(b => { if (b.dataset.k === e.key) b.dispatchEvent(new Event('pointerdown')); });
        } else if (e.key === 'Backspace') {
            step.querySelectorAll('[data-k="back"]')[0]?.dispatchEvent(new Event('pointerdown'));
        }
    };

    // Auto-advance when 4 digits entered
    const orig = pf.getValue;
    let checking = false;
    const observer = new MutationObserver(() => {
        if (pf.getValue().length === 4 && !checking) {
            checking = true;
            setTimeout(() => { firstPin = pf.getValue(); document.removeEventListener('keydown', keyHandler); showStep2(); }, 200);
        }
    });
    observer.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
    document.addEventListener('keydown', keyHandler);
}

function showStep2() {
    const step = document.getElementById('pin-step');
    const pf = makePinField(step, Lang.t('setupPin.confirmLabel'), 4);

    const keyHandler = e => {
        e.preventDefault(); e.stopPropagation();
    };
    document.addEventListener('keydown', keyHandler);

    // Watch for 4 digits then submit
    const observer = new MutationObserver(() => {
        if (pf.getValue().length === 4) {
            observer.disconnect();
            setTimeout(async () => {
                const pin = pf.getValue();
                const pin_confirm = pin;
                // We need to verify firstPin === pin here
                if (pin !== firstPin) {
                    pf.showError(Lang.t('setupPin.mismatch') || 'PINs do not match');
                    pf.reset();
                    return;
                }
                try {
                    await API.post('/api/auth/setup-pin', { pin: firstPin, pin_confirm: pin });
                    document.removeEventListener('keydown', keyHandler);
                    window.location.href = '/index.html';
                } catch (err) {
                    pf.showError(err.detail || 'Error');
                    pf.reset();
                }
            }, 200);
        }
    });
    observer.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
}

applyTranslations().then(showStep1);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Users</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="admin-page">
        <nav class="admin-nav">
            <a href="/admin/users.html" class="admin-nav-item active"><i class="fa-solid fa-users"></i> <span class="nav-label-users"></span></a>
            <a href="/admin/overdue.html" class="admin-nav-item"><i class="fa-solid fa-clock-rotate-left"></i> <span class="nav-label-overdue"></span></a>
            <a href="/admin/rebuy.html" class="admin-nav-item"><i class="fa-solid fa-cart-shopping"></i> <span class="nav-label-rebuy"></span></a>
            <a href="/admin/settings.html" class="admin-nav-item"><i class="fa-solid fa-gear"></i> <span class="nav-label-settings"></span></a>
        </nav>
        <div class="admin-body">
            <div id="user-list" class="user-list">
                <div class="empty-state" id="initial-loading"></div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyNavLabels() {
    document.querySelector('.nav-label-users').textContent    = Lang.t('admin.users');
    document.querySelector('.nav-label-overdue').textContent  = Lang.t('admin.overdue');
    document.querySelector('.nav-label-rebuy').textContent    = Lang.t('admin.rebuy');
    document.querySelector('.nav-label-settings').textContent = Lang.t('admin.settings');
    document.getElementById('initial-loading').textContent    = Lang.t('empty.loading');
}

function showQr(src) {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<img src="${src}" class="overlay-img">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
    document.body.appendChild(overlay);
}

let currentUserId = null;

async function loadUsers() {
    const list = document.getElementById('user-list');
    try {
        const users = await API.get('/api/admin/users');
        if (!users.length) {
            list.innerHTML = `<div class="empty-state">${Lang.t('adminUsers.noUsers')}</div>`;
            return;
        }
        const userIds = users.map(u => u.id);
        list.innerHTML = users.map(u => {
            const balClass   = u.guthaben > 10 ? 'bal-ok' : u.guthaben > 0 ? 'bal-warn' : 'bal-danger';
            const inactiveBadge = !u.active ? `<span class="badge-inactive">${Lang.t('adminUsers.inactive')}</span>` : '';
            const isSelf     = u.id === currentUserId;

            const promoteBtn = isSelf ? '' : `
                <button class="btn-promote ${u.is_admin ? 'is-admin' : 'not-admin'}"
                        data-tip="${u.is_admin ? 'Remove admin rights' : 'Make admin'}"
                        onclick="promote(${u.id}, ${u.is_admin})">
                    <span class="lbl-normal">${u.is_admin ? 'Admin' : 'A'}</span>
                    <span class="lbl-hover">${u.is_admin ? '—' : 'A'}</span>
                </button>`;

            const forcePinBtn = isSelf
                ? `<button class="btn btn-ghost btn-sm invisible"><i class="fa-solid fa-rotate-left"></i></button>`
                : `<button class="btn btn-ghost btn-sm tip-left" data-tip="${Lang.t('adminUsers.forcePin')}" onclick="forcePin(${u.id})"><i class="fa-solid fa-rotate-left"></i></button>`;

            const deactivateBtn = isSelf
                ? `<button class="btn btn-ghost btn-sm invisible"><i class="fa-solid ${u.active ? 'fa-lock' : 'fa-user-lock'}"></i></button>`
                : `<button class="btn btn-ghost btn-sm tip-left" data-tip="${u.active ? Lang.t('adminUsers.deactivate') : Lang.t('adminUsers.activate')}" onclick="deactivate(${u.id}, ${u.active})"><i class="fa-solid ${u.active ? 'fa-lock' : 'fa-user-lock'}"></i></button>`;

            const deleteBtn = isSelf
                ? `<button class="btn btn-danger btn-sm invisible"><i class="fa-solid fa-trash"></i></button>`
                : `<button class="btn btn-danger btn-sm tip-left" data-tip="${Lang.t('adminUsers.delete')}" onclick="deleteUser(${u.id})"><i class="fa-solid fa-trash"></i></button>`;

            return `
                <div id="wrap-${u.id}">
                <div class="user-row" id="user-${u.id}">
                    <div class="user-main">
                        <div class="user-info">
                            <span class="user-name${!u.active ? ' user-locked' : ''}">${!u.active ? '<i class="fa-solid fa-lock lock-icon"></i>' : ''}${esc(u.username)}</span>
                            ${inactiveBadge}
                        </div>
                        <div class="user-stats">
                            <span class="user-balance ${balClass}">${fmtEur(u.guthaben)}</span>
                            ${promoteBtn}
                        </div>
                        <div class="user-actions">
                            ${isSelf ? '' : `
                            <button class="btn btn-ghost user-qr-btn" onclick="showQr('/user-qr/${u.id}.png')"
                                    data-tip="${Lang.t('adminUsers.fastLogin')}">
                                <span class="user-qr-label">${esc(u.username)} · ${Lang.t('adminUsers.fastLogin')}</span>
                                <i class="fa-solid fa-qrcode user-qr-icon"></i>
                            </button>`}
                        </div>
                    </div>
                    <div class="user-adjust">
                        ${isSelf ? `
                        <div class="adjust-form">
                            <a href="/account.html" class="btn btn-ghost">${Lang.t('adminUsers.goToAccount')}</a>
                        </div>` : `
                        <div class="adjust-form">
                            <input type="number" step="0.01" placeholder="± €" id="adj-${u.id}"
                                   class="form-input adjust-amount" inputmode="none">
                            <button type="button" id="btn-numpad-adj-${u.id}" class="btn btn-ghost adjust-kbd-btn" tabindex="-1" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                            <button class="btn btn-ghost adjust-icon-btn mr-auto" onclick="adjust(${u.id})" data-tip="${Lang.t('adminUsers.adjust')}"><i class="fa-solid fa-square-check"></i></button>
                            <button type="button" id="btn-numpad-pin-${u.id}" class="btn btn-ghost adjust-kbd-btn" tabindex="-1" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                            <input type="text" inputmode="none" maxlength="4" placeholder="••••"
                                   id="pin-${u.id}" class="form-input adjust-amount pin-admin-input"
                                   data-tip="${Lang.t('adminUsers.pinHint')}">
                            <button class="btn btn-ghost adjust-icon-btn" onclick="setPin(${u.id})" data-tip="${Lang.t('adminUsers.setPin')}"><i class="fa-solid fa-square-check"></i></button>
                            ${forcePinBtn}
                            ${deactivateBtn}
                            ${deleteBtn}
                        </div>`}
                    </div>
                </div>
                <div id="msg-${u.id}" class="fetch-status text-right" style="display:none;padding:4px 14px 6px"></div>
                </div>
            `;
        }).join('');
        userIds.forEach(uid => {
            const pinInput = document.getElementById(`pin-${uid}`);
            const numpadBtn = document.getElementById(`btn-numpad-pin-${uid}`);
            if (pinInput && numpadBtn) attachNumpad(pinInput, numpadBtn, {});
            const adjInput = document.getElementById(`adj-${uid}`);
            const adjBtn = document.getElementById(`btn-numpad-adj-${uid}`);
            if (adjInput && adjBtn) attachNumpad(adjInput, adjBtn, { decimal: true });
        });
    } catch (err) {
        if (handleAuthError(err)) return;
        list.innerHTML = `<p class="text-danger">${esc(err.detail)}</p>`;
    }
}

function showMsg(uid, text, ok) {
    const el = document.getElementById(`msg-${uid}`);
    el.className = `fetch-status ${ok ? 'text-success' : 'text-danger'}`;
    el.textContent = text;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function promote(uid, isAdmin) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/promote`);
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function deactivate(uid, active) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/deactivate`);
        const name = document.querySelector(`#user-${uid} .user-name`)?.textContent || '';
        const key = res.active ? 'adminUsers.msgUnlocked' : 'adminUsers.msgLocked';
        showMsg(uid, Lang.t(key, { name }), true);
        setTimeout(loadUsers, 1000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

function deleteUser(uid) {
    const btn = document.querySelector(`#wrap-${uid} .btn-danger`);
    if (!btn) return;
    btn.outerHTML = `
        <span id="del-confirm-${uid}" class="inline-flex items-center gap-1">
            <span class="fetch-status text-danger">${Lang.t('adminUsers.confirmDelete')}</span>
            <button class="btn btn-danger btn-sm" onclick="deleteUserConfirmed(${uid})">${Lang.t('adminUsers.confirmYes')}</button>
            <button class="btn btn-ghost btn-sm" onclick="loadUsers()">${Lang.t('adminUsers.confirmNo')}</button>
        </span>`;
}

async function deleteUserConfirmed(uid) {
    try {
        const res = await API.delete(`/api/admin/users/${uid}`);
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 3000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function setPin(uid) {
    const pin = document.getElementById(`pin-${uid}`).value.trim();
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
        showMsg(uid, Lang.t('adminUsers.enter4Pin'), false); return;
    }
    try {
        const res = await API.post(`/api/admin/users/${uid}/set-pin`, { pin });
        document.getElementById(`pin-${uid}`).value = '';
        showMsg(uid, res.message, true);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function forcePin(uid) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/force-pin`);
        showMsg(uid, res.message, true);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function adjust(uid) {
    const amount = parseFloat(document.getElementById(`adj-${uid}`).value);
    if (isNaN(amount)) { showMsg(uid, Lang.t('adminUsers.enterAmount'), false); return; }
    try {
        const res = await API.post(`/api/admin/users/${uid}/adjust`, { amount });
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1200);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

Lang.load().then(() => {
    applyNavLabels();
    initPage().then(user => { currentUserId = user.id; requireAdminPin(loadUsers); });
});
</script>
</body>
</html>

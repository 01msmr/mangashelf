<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Users</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="admin-page">
        <nav class="admin-nav">
            <a href="/admin/users.html" class="admin-nav-item active"><i class="fa-solid fa-users"></i> Users</a>
            <a href="/admin/overdue.html" class="admin-nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Overdue</a>
            <a href="/admin/rebuy.html" class="admin-nav-item"><i class="fa-solid fa-cart-shopping"></i> Rebuy</a>
            <a href="/admin/settings.html" class="admin-nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
        </nav>
        <div class="admin-body">
            <div id="user-list" class="user-list">
                <div class="empty-state">Loading…</div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showQr(src) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;' +
        'display:flex;align-items:center;justify-content:center;cursor:pointer';
    overlay.innerHTML = `<img src="${src}" style="max-width:80vw;max-height:80vh;border-radius:8px;background:#fff;padding:14px;box-shadow:0 0 40px rgba(0,0,0,0.8)">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
    document.body.appendChild(overlay);
}

let currentUserId = null;

async function loadUsers() {
    const list = document.getElementById('user-list');
    try {
        const users = await API.get('/api/admin/users');
        if (!users.length) {
            list.innerHTML = '<div class="empty-state">No users.</div>';
            return;
        }
        const userIds = users.map(u => u.id);
        list.innerHTML = users.map(u => {
            const balClass   = u.guthaben > 10 ? 'bal-ok' : u.guthaben > 0 ? 'bal-warn' : 'bal-danger';
            const inactiveBadge = !u.active ? '<span class="badge-inactive">Inactive</span>' : '';
            const isSelf     = u.id === currentUserId;

            const promoteBtn = isSelf ? '' : `
                <button class="btn-promote ${u.is_admin ? 'is-admin' : 'not-admin'}"
                        title="${u.is_admin ? 'Remove admin rights' : 'Make admin'}"
                        onclick="promote(${u.id}, ${u.is_admin}, ${JSON.stringify(u.username)})">
                    <span class="lbl-normal">${u.is_admin ? 'Admin' : 'A'}</span>
                    <span class="lbl-hover">${u.is_admin ? '—' : 'A'}</span>
                </button>`;

            const deactivateBtn = isSelf ? '' : `
                <button class="btn btn-ghost btn-sm" onclick="deactivate(${u.id}, ${u.active}, ${JSON.stringify(u.username)})">
                    ${u.active ? 'Deactivate' : 'Activate'}
                </button>`;

            const deleteBtn = isSelf ? '' : `
                <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, ${JSON.stringify(u.username)})">
                    Delete
                </button>`;

            return `
                <div class="user-row" id="user-${u.id}">
                    <div class="user-main">
                        <div class="user-info">
                            <span class="user-name">${esc(u.username)}</span>
                            ${inactiveBadge}
                        </div>
                        <div class="user-stats">
                            <span class="user-balance ${balClass}">${u.guthaben.toFixed(2)} €</span>
                            ${promoteBtn}
                        </div>
                        <div class="user-actions">
                            <button class="btn btn-ghost" onclick="showQr('/user-qr/${u.id}.png')"
                                    title="Show QR code"
                                    style="height:52px;padding:0 14px 0 12px;gap:12px;display:flex;align-items:center">
                                <span style="font-size:13px;color:var(--text-muted);white-space:nowrap">fast user login:</span>
                                <i class="fa-solid fa-qrcode" style="font-size:38px;color:#fff"></i>
                            </button>
                        </div>
                    </div>
                    <div class="user-adjust">
                        <div class="adjust-form" style="justify-content:flex-end">
                            <div class="input-with-btn">
                                <input type="number" step="0.01" placeholder="± amount" id="adj-${u.id}"
                                       class="form-input adjust-amount" inputmode="none">
                                <button type="button" id="btn-numpad-adj-${u.id}" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" title="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                            </div>
                            <input type="text" placeholder="Reason" id="reason-${u.id}"
                                   class="form-input adjust-reason">
                            <button class="btn btn-ghost btn-sm" style="margin-right:auto" onclick="adjust(${u.id})">Adjust</button>
                            <div class="input-with-btn">
                                <input type="text" inputmode="none" maxlength="4" placeholder="PIN"
                                       id="pin-${u.id}" class="form-input adjust-amount pin-admin-input">
                                <button type="button" id="btn-numpad-pin-${u.id}" class="btn btn-ghost btn-sm btn-inside" tabindex="-1" title="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                            </div>
                            <button class="btn btn-ghost btn-sm" onclick="setPin(${u.id}, ${JSON.stringify(u.username)})">Set PIN</button>
                            <button class="btn btn-ghost btn-sm" onclick="forcePin(${u.id}, ${JSON.stringify(u.username)})">Force PIN</button>
                            ${deactivateBtn}
                            ${deleteBtn}
                        </div>
                        <div id="msg-${u.id}" class="fetch-status" style="display:none"></div>
                    </div>
                </div>
            `;
        }).join('');
        userIds.forEach(uid => {
            const pinInput = document.getElementById(`pin-${uid}`);
            const numpadBtn = document.getElementById(`btn-numpad-pin-${uid}`);
            if (pinInput && numpadBtn) attachNumpad(pinInput, numpadBtn, {});
            const adjInput = document.getElementById(`adj-${uid}`);
            const adjBtn = document.getElementById(`btn-numpad-adj-${uid}`);
            if (adjInput && adjBtn) attachNumpad(adjInput, adjBtn, { decimal: true });
        });
    } catch (err) {
        if (handleAuthError(err)) return;
        list.innerHTML = `<p class="text-danger">${esc(err.detail)}</p>`;
    }
}

function showMsg(uid, text, ok) {
    const el = document.getElementById(`msg-${uid}`);
    el.className = `fetch-status ${ok ? 'text-success' : 'text-danger'}`;
    el.textContent = text;
    el.style.display = 'block';
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function promote(uid, isAdmin, username) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/promote`);
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function deactivate(uid, active, username) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/deactivate`);
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function deleteUser(uid, username) {
    try {
        const res = await API.delete(`/api/admin/users/${uid}`);
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1000);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function setPin(uid, username) {
    const pin = document.getElementById(`pin-${uid}`).value.trim();
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
        showMsg(uid, 'Enter a 4-digit PIN first.', false); return;
    }
    try {
        const res = await API.post(`/api/admin/users/${uid}/set-pin`, { pin });
        document.getElementById(`pin-${uid}`).value = '';
        showMsg(uid, res.message, true);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function forcePin(uid, username) {
    try {
        const res = await API.post(`/api/admin/users/${uid}/force-pin`);
        showMsg(uid, res.message, true);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

async function adjust(uid) {
    const amount = parseFloat(document.getElementById(`adj-${uid}`).value);
    const reason = document.getElementById(`reason-${uid}`).value;
    if (isNaN(amount)) { showMsg(uid, 'Enter an amount', false); return; }
    try {
        const res = await API.post(`/api/admin/users/${uid}/adjust`, { amount, reason });
        showMsg(uid, res.message, true);
        setTimeout(loadUsers, 1200);
    } catch (err) { showMsg(uid, err.detail || 'Failed', false); }
}

initPage().then(user => { currentUserId = user.id; requireAdminPin(loadUsers); });
</script>
</body>
</html>

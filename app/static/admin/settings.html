<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Settings</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="admin-page">
        <nav class="admin-nav">
            <a href="/admin/users.html" class="admin-nav-item"><i class="fa-solid fa-users"></i> <span class="nav-label-users"></span></a>
            <a href="/admin/overdue.html" class="admin-nav-item"><i class="fa-solid fa-clock-rotate-left"></i> <span class="nav-label-overdue"></span></a>
            <a href="/admin/rebuy.html" class="admin-nav-item"><i class="fa-solid fa-cart-shopping"></i> <span class="nav-label-rebuy"></span></a>
            <a href="/admin/settings.html" class="admin-nav-item active"><i class="fa-solid fa-gear"></i> <span class="nav-label-settings"></span></a>
        </nav>
        <div class="admin-body">
            <div class="hint-aside-row" style="align-items:start;padding-top:8px;gap:16px;flex-wrap:wrap">
                <!-- Card 1: Library settings -->
                <div class="card" style="max-width:380px;flex:1;min-width:280px">
                    <div class="card-header" id="card-title"></div>
                    <div class="card-body">
                        <div class="form-group mb-3">
                            <label class="form-label" id="label-max-books"></label>
                            <input type="number" id="max-books" class="form-input" min="1" max="20" value="3">
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label" id="label-max-days"></label>
                            <input type="number" id="max-days" class="form-input" min="7" max="365" value="60">
                        </div>
                        <div class="form-group mb-3">
                            <label class="form-label" id="label-default-rate"></label>
                            <select id="default-rate" class="form-input form-select">
                                <option value="0.50">0.50 €</option>
                                <option value="1.00">1.00 €</option>
                                <option value="1.50">1.50 €</option>
                                <option value="2.00">2.00 €</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" id="btn-save"></button>
                        <div id="msg" class="fetch-status mt-2" style="display:none"></div>
                    </div>
                </div>
                <!-- Card 2: Admin actions -->
                <div class="card" style="max-width:380px;flex:1;min-width:280px">
                    <div class="card-header" id="card-title-actions"></div>
                    <div class="card-body">
                        <div class="form-group mb-3">
                            <label class="form-label" id="label-admin-pin"></label>
                            <div id="admin-pin-desc" style="font-size:var(--text-xs);color:var(--text-muted);margin-bottom:8px"></div>
                            <div style="display:flex;gap:8px;align-items:center">
                                <input type="password" id="new-admin-pin" class="form-input pin-admin-input" inputmode="none" maxlength="4" placeholder="••••" style="flex:1">
                                <button type="button" id="btn-numpad-admin-pin" class="btn btn-ghost btn-sm" tabindex="-1" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
                                <button class="btn btn-ghost btn-sm" id="btn-set-admin-pin"></button>
                            </div>
                            <div id="admin-pin-msg" class="fetch-status mt-1" style="display:none"></div>
                        </div>
                        <hr class="divider">
                        <div id="purge-desc" style="font-size:13px;color:var(--text-muted);margin-bottom:8px"></div>
                        <button class="btn btn-danger btn-sm" id="btn-purge"></button>
                        <div id="purge-msg" class="fetch-status mt-2" style="display:none"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
function applyTranslations() {
    document.querySelector('.nav-label-users').textContent    = Lang.t('admin.users');
    document.querySelector('.nav-label-overdue').textContent  = Lang.t('admin.overdue');
    document.querySelector('.nav-label-rebuy').textContent    = Lang.t('admin.rebuy');
    document.querySelector('.nav-label-settings').textContent = Lang.t('admin.settings');
    document.getElementById('card-title').textContent         = Lang.t('adminSettings.cardTitle');
    document.getElementById('card-title-actions').textContent = Lang.t('adminSettings.actionsTitle');
    document.getElementById('label-max-books').textContent    = Lang.t('adminSettings.maxBooks');
    document.getElementById('label-max-days').textContent     = Lang.t('adminSettings.maxDays');
    document.getElementById('label-default-rate').textContent = Lang.t('adminSettings.defaultRate');
    document.getElementById('btn-save').textContent           = Lang.t('adminSettings.saveBtn');
    document.getElementById('label-admin-pin').textContent    = Lang.t('adminSettings.adminPinLabel');
    document.getElementById('admin-pin-desc').textContent     = Lang.t('adminSettings.adminPinDesc');
    document.getElementById('btn-set-admin-pin').textContent  = Lang.t('adminSettings.setPinBtn');
    document.getElementById('purge-desc').textContent         = Lang.t('adminSettings.purgeDesc');
    document.getElementById('btn-purge').textContent          = Lang.t('adminSettings.purgeBtn');
}

async function init() {
    await Lang.load();
    applyTranslations();
    await initPage();
    requireAdminPin(loadContent);
}

async function loadContent() {
    try {
        const s = await API.get('/api/admin/settings');
        document.getElementById('max-books').value    = s.max_books_per_user;
        document.getElementById('max-days').value     = s.max_loan_days;
        document.getElementById('default-rate').value = s.default_loan_rate;
    } catch (err) {
        if (handleAuthError(err)) return;
    }
}

document.getElementById('btn-save').addEventListener('click', async () => {
    const msgEl = document.getElementById('msg');
    const body = {
        max_books_per_user: parseInt(document.getElementById('max-books').value),
        max_loan_days:      parseInt(document.getElementById('max-days').value),
        default_loan_rate:  document.getElementById('default-rate').value,
    };
    try {
        await API.post('/api/admin/settings', body);
        msgEl.className = 'fetch-status text-success';
        msgEl.textContent = Lang.t('adminSettings.saved');
        msgEl.style.display = 'block';
        setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
    } catch (err) {
        msgEl.className = 'fetch-status text-danger';
        msgEl.textContent = err.detail || 'Failed.';
        msgEl.style.display = 'block';
    }
});

document.getElementById('btn-set-admin-pin').addEventListener('click', async () => {
    const pin   = document.getElementById('new-admin-pin').value.trim();
    const msgEl = document.getElementById('admin-pin-msg');
    if (pin.length !== 4 || !/^\d{4}$/.test(pin)) {
        msgEl.className = 'fetch-status text-danger';
        msgEl.textContent = Lang.t('adminSettings.enter4Pin');
        msgEl.style.display = 'block'; return;
    }
    try {
        const res = await API.post('/api/admin/set-admin-pin', { new_pin: pin });
        document.getElementById('new-admin-pin').value = '';
        msgEl.className = 'fetch-status text-success'; msgEl.textContent = res.message;
        msgEl.style.display = 'block';
        setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
    } catch (err) {
        msgEl.className = 'fetch-status text-danger'; msgEl.textContent = err.detail || 'Failed.';
        msgEl.style.display = 'block';
    }
});

document.getElementById('btn-purge').addEventListener('click', async () => {
    const msgEl = document.getElementById('purge-msg');
    if (!confirm(Lang.t('adminSettings.purgeConfirm'))) return;
    try {
        const res = await API.post('/api/admin/purge-empty-books');
        msgEl.className = 'fetch-status text-success';
        msgEl.textContent = res.message;
        msgEl.style.display = 'block';
    } catch (err) {
        msgEl.className = 'fetch-status text-danger';
        msgEl.textContent = err.detail || 'Failed.';
        msgEl.style.display = 'block';
    }
});

init().then(() => {
    attachNumpad(document.getElementById('new-admin-pin'), document.getElementById('btn-numpad-admin-pin'), {});
});
</script>
</body>
</html>

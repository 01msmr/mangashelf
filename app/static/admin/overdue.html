<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Overdue</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="admin-page">
        <nav class="admin-nav">
            <a href="/admin/users.html" class="admin-nav-item"><i class="fa-solid fa-users"></i> <span class="nav-label-users"></span></a>
            <a href="/admin/overdue.html" class="admin-nav-item active">
                <i class="fa-solid fa-clock-rotate-left"></i> <span class="nav-label-overdue"></span> <span class="nav-badge" id="overdue-badge" style="display:none"></span>
            </a>
            <a href="/admin/rebuy.html" class="admin-nav-item"><i class="fa-solid fa-cart-shopping"></i> <span class="nav-label-rebuy"></span></a>
            <a href="/admin/settings.html" class="admin-nav-item"><i class="fa-solid fa-gear"></i> <span class="nav-label-settings"></span></a>
        </nav>
        <div class="admin-body">
            <div id="list" class="overdue-list">
                <div class="empty-state" id="initial-loading"></div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function applyNavLabels() {
    document.querySelector('.nav-label-users').textContent    = Lang.t('admin.users');
    document.querySelector('.nav-label-overdue').textContent  = Lang.t('admin.overdue');
    document.querySelector('.nav-label-rebuy').textContent    = Lang.t('admin.rebuy');
    document.querySelector('.nav-label-settings').textContent = Lang.t('admin.settings');
    document.getElementById('initial-loading').textContent    = Lang.t('empty.loading');
}

async function init() {
    await Lang.load();
    applyNavLabels();
    await initPage();
    requireAdminPin(loadContent);
}

async function loadContent() {
    const list = document.getElementById('list');
    try {
        const items = await API.get('/api/admin/overdue');
        if (!items.length) {
            list.innerHTML = `<div class="empty-state">${Lang.t('adminOverdue.none')}</div>`;
            return;
        }
        document.getElementById('overdue-badge').textContent = items.length;
        document.getElementById('overdue-badge').style.display = 'inline-block';
        list.innerHTML = items.map(i => {
            const coverHtml = i.cover_path
                ? `<div class="overdue-cover"><img src="/static/${esc(i.cover_path)}" alt=""></div>`
                : '';
            return `
                <div class="overdue-row">
                    ${coverHtml}
                    <div class="overdue-info">
                        <div class="overdue-title">
                            <a href="/book.html?isbn=${encodeURIComponent(i.book_isbn)}" class="overdue-book-link">${esc(i.book_title)}</a>
                        </div>
                        <div class="overdue-meta">
                            <span class="overdue-borrower${!i.user_active ? ' user-locked' : ''}">${!i.user_active ? '<i class="fa-solid fa-lock" style="font-size:10px;margin-right:4px;opacity:.8"></i>' : ''}${esc(i.username)}</span>
                            <span class="overdue-due">${Lang.t('adminOverdue.due')} ${esc(fmtDate(i.due_date))}</span>
                        </div>
                    </div>
                    <div class="overdue-right">
                        <span class="overdue-days-badge">${Lang.t('adminOverdue.daysOverdue', { n: i.days_overdue })}</span>
                    </div>
                </div>
            `;
        }).join('');
    } catch (err) {
        if (handleAuthError(err)) return;
        list.innerHTML = `<p class="text-danger">${esc(err.detail)}</p>`;
    }
}

init();
</script>
</body>
</html>

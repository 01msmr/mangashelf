<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Add Book</title>
    <script src="/static/js/scale.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="addbook-page">
        <div class="detail-topbar">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="topbar-back"></a>
            <span class="flex-1"></span>
            <button type="button" class="btn btn-ghost btn-sm" id="btn-numpad" data-tip="Numpad"><i class="fa-solid fa-keyboard"></i></button>
            <div class="relative flex items-center flex-1" style="max-width:220px">
                <input type="text" id="isbn-scan" class="form-input scan-bar-input w-full"
                       placeholder="Scan or type ISBN…" inputmode="none"
                       style="padding-left:36px">
                <button type="button" id="btn-clear-isbn" class="btn btn-ghost btn-sm absolute" tabindex="-1"
                        style="display:none;left:4px">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <button type="button" class="btn btn-ghost btn-sm" id="btn-lookup-top" data-tip="Lookup"><i class="fa-solid fa-magnifying-glass"></i></button>
            <button type="button" class="btn btn-ghost btn-sm" id="btn-camera" data-tip="Camera"><i class="fa-solid fa-camera"></i></button>
        </div>

        <!-- Camera scanner overlay -->
        <div id="scanner-overlay" style="display:none">
            <video id="scanner-video"></video>
            <button class="btn btn-ghost" id="btn-close-scanner"></button>
        </div>
        <div class="addbook-layout">
            <div class="addbook-form-col">
                <form id="add-form">
                    <div class="msg-placeholder"><div id="lookup-msg" class="fetch-status" style="display:none"></div></div>
                    <div class="form-group">
                        <label class="form-label" id="label-title"></label>
                        <input type="text" id="title" class="form-input">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label" id="label-subtitle"></label>
                            <input type="text" id="subtitle" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" id="label-series"></label>
                            <input type="text" id="series" class="form-input" placeholder="1">
                            <div id="series-dupe-hint" class="fetch-status text-warning" style="display:none;margin-top:4px;font-size:0.82em"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="label-author"></label>
                        <input type="text" id="author" class="form-input">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label" id="label-publisher"></label>
                            <input type="text" id="publisher" class="form-input">
                        </div>
                        <div class="form-group">
                            <label class="form-label" id="label-published"></label>
                            <input type="text" id="published" class="form-input">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" id="label-cover-url"></label>
                        <input type="text" id="cover-url" class="form-input">
                    </div>
                    <div class="form-row-2">
                        <div class="form-group">
                            <label class="form-label" id="label-loan-rate"></label>
                            <select id="loan-rate" class="form-input form-select">
                                <option value="0.50">0.50 €</option>
                                <option value="1.00">1.00 €</option>
                                <option value="1.50">1.50 €</option>
                                <option value="2.00">2.00 €</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" id="label-donor"></label>
                            <select id="donor-id" class="form-input form-select">
                                <option value="" id="donor-none-opt"></option>
                            </select>
                        </div>
                    </div>
                    <div class="msg-placeholder"><div id="save-msg" class="fetch-status" style="display:none"></div></div>
                    <div class="flex mt-1" style="gap:10%">
                        <a href="/index.html" class="btn btn-ghost" id="btn-cancel" style="width:30%;flex-shrink:0"></a>
                        <button type="button" class="btn btn-primary" id="btn-add" style="flex:1"></button>
                    </div>
                </form>
            </div>
            <div class="addbook-cover-col">
                <div class="cover-preview-wrap" id="cover-preview">
                    <div id="cover-text-placeholder" class="cover-text-placeholder">
                        <span id="cover-title" class="cover-text-title"></span>
                        <span id="cover-author" class="cover-text-author"></span>
                    </div>
                </div>
                <div class="hint text-muted" id="hint-aside">
                </div>
            </div>
        </div>
    </div>
</main>


<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/zxing-browser.min.js"></script>
<script src="/static/js/numpad.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function set(id, val) { document.getElementById(id).value = val || ''; }

let requiresSeries = false;
let dupeCheckTimer;

function updateSeriesHint(show) {
    document.getElementById('series-dupe-hint').style.display = show ? 'block' : 'none';
    document.getElementById('series-dupe-hint').textContent = show ? Lang.t('addBook.seriesRequired') : '';
    document.getElementById('series').style.outline = show ? '2px solid var(--color-warning, #f59e0b)' : '';
}

async function checkDuplicateTitle() {
    const title = document.getElementById('title').value.trim();
    const editIsbn = new URLSearchParams(location.search).get('edit') || '';
    const excludeIsbn = editIsbn || isbnScan.value.trim();
    if (!title) { requiresSeries = false; updateSeriesHint(false); return; }
    try {
        const data = await API.get(`/api/books?q=${encodeURIComponent(title)}`);
        const dupes = (data.items || []).filter(b =>
            b.title.toLowerCase() === title.toLowerCase() && b.isbn !== excludeIsbn
        );
        requiresSeries = dupes.length > 0;
        updateSeriesHint(requiresSeries);
    } catch (e) {}
}

const isbnScan    = document.getElementById('isbn-scan');
const btnClearIsbn = document.getElementById('btn-clear-isbn');

function updateCoverPlaceholder() {
    const titleEl = document.getElementById('cover-title');
    const authorEl = document.getElementById('cover-author');
    if (titleEl) titleEl.textContent = document.getElementById('title').value || '';
    if (authorEl) authorEl.textContent = document.getElementById('author').value || '';
}

function applyTranslations() {
    document.getElementById('isbn-scan').placeholder       = Lang.t('addBook.isbnPlaceholder');
    document.getElementById('btn-numpad').dataset.tip      = Lang.t('common.numpad');
    document.getElementById('btn-lookup-top').dataset.tip  = Lang.t('addBook.lookup');
    document.getElementById('btn-camera').dataset.tip      = Lang.t('addBook.camera');
    document.getElementById('topbar-back').textContent     = Lang.t('addBook.back');
    document.getElementById('btn-close-scanner').textContent = Lang.t('addBook.close');
    document.getElementById('label-title').textContent     = Lang.t('addBook.titleLabel');
    document.getElementById('label-subtitle').textContent  = Lang.t('addBook.subtitleLabel');
    document.getElementById('label-series').textContent    = Lang.t('addBook.seriesLabel');
    document.getElementById('label-author').textContent    = Lang.t('addBook.authorLabel');
    document.getElementById('label-publisher').textContent = Lang.t('addBook.publisherLabel');
    document.getElementById('label-published').textContent = Lang.t('addBook.publishedLabel');
    document.getElementById('label-cover-url').textContent = Lang.t('addBook.coverUrlLabel');
    document.getElementById('label-loan-rate').textContent = Lang.t('addBook.loanRateLabel');
    document.getElementById('label-donor').textContent     = Lang.t('addBook.donorLabel');
    document.getElementById('donor-none-opt').textContent  = Lang.t('addBook.donorNone');
    document.getElementById('btn-add').textContent         = Lang.t('addBook.addBtn');
    document.getElementById('btn-cancel').textContent      = Lang.t('addBook.cancelBtn');
    document.getElementById('hint-aside').innerHTML = `
        <p>${Lang.t('addBook.hint1')}</p>
        <p>${Lang.t('addBook.hint2')}</p>
        <p>${Lang.t('addBook.hint3')}</p>
    `;
}

async function init() {
    await Lang.load();
    applyTranslations();
    const user = await initPage();
    if (!user.is_admin) { window.location.href = '/index.html'; return; }

    const params = new URLSearchParams(location.search);
    const isbn   = params.get('isbn') || '';
    const editIsbn = params.get('edit') || '';

    if (isbn) { isbnScan.value = isbn; btnClearIsbn.style.display = 'block'; doLookup(isbn); }

    if (editIsbn) {
        isbnScan.value = editIsbn;
        isbnScan.disabled = true;
        btnClearIsbn.style.display = 'none';
        document.getElementById('btn-add').textContent = Lang.t('addBook.saveEdit');
        try {
            const book = await API.get(`/api/books/${encodeURIComponent(editIsbn)}`);
            set('title',     book.title);
            set('subtitle',  book.subtitle);
            set('series',    book.series);
            set('author',    book.author);
            set('publisher', book.publisher);
            set('published', book.published);
            if (book.loan_rate) document.getElementById('loan-rate').value = book.loan_rate;
            updateCoverPlaceholder();
            if (book.cover_path) {
                document.getElementById('cover-preview').innerHTML =
                    `<img class="cover-preview-img" src="/static/${esc(book.cover_path)}" alt="">`;
            }
        } catch (e) {}
    }

    try {
        const sel = document.getElementById('donor-id');
        if (user.is_admin) {
            const users = await API.get('/api/admin/users');
            users.filter(u => u.active && !u.is_system).forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.id; opt.textContent = u.username;
                sel.appendChild(opt);
            });
        } else {
            const opt = document.createElement('option');
            opt.value = user.id; opt.textContent = user.username; opt.selected = true;
            sel.appendChild(opt);
        }
    } catch (e) {}

    if (!isServer) startScanner();
}

async function doLookup(isbn) {
    const msgEl = document.getElementById('lookup-msg');
    msgEl.className = 'fetch-status text-muted';
    msgEl.textContent = Lang.t('addBook.lookingUp');
    msgEl.style.display = 'block';
    const editMode = !!(new URLSearchParams(location.search).get('edit'));
    try {
        const meta = await API.get(`/api/books/fetch-isbn?isbn=${encodeURIComponent(isbn)}`);
        // In edit mode only fill empty fields; in add mode fill everything
        function merge(id, val) {
            if (!val) return;
            if (editMode && document.getElementById(id).value.trim()) return;
            set(id, val);
        }
        merge('title',     meta.title);
        merge('subtitle',  meta.subtitle);
        merge('series',    meta.series);
        merge('author',    meta.author);
        merge('publisher', meta.publisher);
        merge('published', meta.published);
        merge('cover-url', meta.cover_url);
        updateCoverPlaceholder();
        checkDuplicateTitle();
        if (meta.cover_url && (!editMode || !document.querySelector('#cover-preview img'))) {
            document.getElementById('cover-preview').innerHTML =
                `<img class="cover-preview-img" src="${esc(meta.cover_url)}" alt="" onerror="this.style.display='none'">`;
        }
        msgEl.className = 'fetch-status text-success';
        msgEl.textContent = Lang.t('addBook.metaLoaded');
        setTimeout(() => { msgEl.style.display = 'none'; }, 2000);
        if (!editMode) {
            const btnAdd = document.getElementById('btn-add');
            try {
                await API.get(`/api/books/${encodeURIComponent(isbn)}`);
                btnAdd.innerHTML = `<i class="fa-solid fa-triangle-exclamation"></i> ${Lang.t('addBook.addCopyBtn')}`;
            } catch (e) {
                btnAdd.textContent = Lang.t('addBook.addBtn');
            }
        }
    } catch (err) {
        msgEl.className = 'fetch-status text-warning';
        msgEl.textContent = Lang.t('addBook.notFound');
        if (!editMode) document.getElementById('btn-add').textContent = Lang.t('addBook.addBtn');
    }
}

// ── Topbar scan bar ──────────────────────────────────────────────
let inputTimer;
isbnScan.addEventListener('input', () => {
    btnClearIsbn.style.display = isbnScan.value ? 'block' : 'none';
    clearTimeout(inputTimer);
    if (isbnScan.value.length >= 8) {
        inputTimer = setTimeout(triggerScanLookup, 300);
    }
});
btnClearIsbn.addEventListener('click', () => {
    isbnScan.value = '';
    btnClearIsbn.style.display = 'none';
    isbnScan.focus();
});

function triggerScanLookup() {
    const v = isbnScan.value.trim();
    if (!v) return;
    doLookup(v);
}
document.getElementById('btn-lookup-top').addEventListener('click', triggerScanLookup);
isbnScan.addEventListener('keydown', e => { if (e.key === 'Enter') triggerScanLookup(); });

// Hardware barcode scanner (rapid keypresses → Enter)
let scanBuffer = '', scanTimer;
document.addEventListener('keypress', e => {
    if (document.activeElement === isbnScan) return;
    if (e.key === 'Enter') {
        if (scanBuffer.length > 5) { isbnScan.value = scanBuffer; btnClearIsbn.style.display = 'block'; triggerScanLookup(); }
        scanBuffer = ''; clearTimeout(scanTimer);
    } else {
        scanBuffer += e.key;
        clearTimeout(scanTimer);
        scanTimer = setTimeout(() => { scanBuffer = ''; }, 500);
    }
});

// ── Camera / hardware scanner ─────────────────────────────────────
const isServer = ['localhost', '127.0.0.1'].includes(location.hostname);
let codeReader;
let _serialPort = null;

async function triggerHardwareScanner() {
    if (!navigator.serial) return;
    try {
        if (!_serialPort) _serialPort = await navigator.serial.requestPort();
        if (!_serialPort.readable) await _serialPort.open({ baudRate: 9600 });
        const writer = _serialPort.writable.getWriter();
        await writer.write(new Uint8Array([0x7E, 0x00, 0x08, 0x01, 0x00, 0x02, 0x01, 0xAB, 0xCD]));
        writer.releaseLock();
    } catch(e) {
        _serialPort = null;
    }
}

function closeScanner() {
    document.getElementById('scanner-overlay').style.display = 'none';
    if (codeReader) { codeReader.reset(); codeReader = null; }
}

async function startScanner() {
    document.getElementById('scanner-overlay').style.display = 'flex';
    const { BrowserMultiFormatReader } = ZXingBrowser;
    codeReader = new BrowserMultiFormatReader();
    try {
        await codeReader.decodeFromVideoDevice(null, document.getElementById('scanner-video'), result => {
            if (!result || !codeReader) return;
            const isbn = result.getText();
            if (!isbn) return;
            const reader = codeReader;
            codeReader = null;
            document.getElementById('scanner-overlay').style.display = 'none';
            setTimeout(() => reader.reset(), 0);
            isbnScan.value = isbn;
            btnClearIsbn.style.display = 'block';
            isbnScan.scrollIntoView({ behavior: 'smooth', block: 'center' });
            triggerScanLookup();
        });
    } catch (e) {
        closeScanner();
    }
}

document.getElementById('btn-camera').style.display = 'inline-flex';
if (isServer) {
    document.getElementById('btn-camera').addEventListener('click', triggerHardwareScanner);
} else {
    document.getElementById('btn-camera').addEventListener('click', startScanner);
}
document.getElementById('btn-close-scanner').addEventListener('click', closeScanner);

document.getElementById('btn-add').addEventListener('click', async () => {
    const msgEl   = document.getElementById('save-msg');
    const editIsbn = new URLSearchParams(location.search).get('edit') || '';
    const body = {
        isbn:      isbnScan.value.trim(),
        title:     document.getElementById('title').value.trim(),
        subtitle:  document.getElementById('subtitle').value.trim() || null,
        series:    document.getElementById('series').value.trim() || null,
        author:    document.getElementById('author').value.trim() || null,
        publisher: document.getElementById('publisher').value.trim() || null,
        published: document.getElementById('published').value.trim() || null,
        cover_url: document.getElementById('cover-url').value.trim() || null,
        loan_rate: parseFloat(document.getElementById('loan-rate').value),
        donor_id:  document.getElementById('donor-id').value ? parseInt(document.getElementById('donor-id').value) : null,
    };
    if (requiresSeries && !body.series) {
        msgEl.className = 'fetch-status text-danger';
        msgEl.textContent = Lang.t('addBook.seriesRequired');
        msgEl.style.display = 'block';
        document.getElementById('series').focus();
        return;
    }
    try {
        if (editIsbn) {
            await API.put(`/api/books/${encodeURIComponent(editIsbn)}`, body);
            window.location.href = `/index.html?q=${encodeURIComponent(editIsbn)}`;
        } else {
            await API.post('/api/books', body);
            window.location.href = `/index.html?new=${encodeURIComponent(body.isbn)}`;
        }
    } catch (err) {
        msgEl.className = 'fetch-status text-danger';
        msgEl.textContent = err.detail || 'Failed.';
        msgEl.style.display = 'block';
    }
});

document.getElementById('title').addEventListener('input', () => {
    updateCoverPlaceholder();
    clearTimeout(dupeCheckTimer);
    dupeCheckTimer = setTimeout(checkDuplicateTitle, 500);
});
document.getElementById('author').addEventListener('input', updateCoverPlaceholder);

// ── Numeric OSK for ISBN field ────────────────────────────────────────────────
init();
attachNumpad(isbnScan, document.getElementById('btn-numpad'));
</script>
</body>
</html>

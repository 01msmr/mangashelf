<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Book</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="detail-page" id="page-root">
        <div class="detail-topbar">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="topbar-back"></a>
            <span class="detail-isbn" id="topbar-isbn"></span>
        </div>
        <div class="detail-body" id="detail-body">
            <div class="detail-info">
                <div class="text-muted" id="initial-loading"></div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/rating.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function starsHtml(avg) {
    if (!avg) return '';
    const n = Math.round(avg);
    const s = Array.from({length: 9}, (_, i) => i < n ? '★' : '☆');
    const gap = '<span style="display:inline-block;width:.22em"></span>';
    return s.slice(0,3).join('') + gap + s.slice(3,6).join('') + gap + s.slice(6,9).join('');
}

async function init() {
    await Lang.load();
    document.getElementById('topbar-back').textContent     = Lang.t('nav.allBooks');
    document.getElementById('initial-loading').textContent = Lang.t('empty.loading');
    const user = await initPage();
    const isbn = new URLSearchParams(location.search).get('isbn');
    if (!isbn) {
        document.getElementById('detail-body').innerHTML = `<div class="detail-info"><p>${Lang.t('borrow.noIsbn')}</p></div>`;
        return;
    }
    document.getElementById('topbar-isbn').textContent = isbn;

    let book;
    try {
        book = await API.get(`/api/books/${encodeURIComponent(isbn)}`);
    } catch (err) {
        if (handleAuthError(err)) return;
        document.getElementById('detail-body').innerHTML =
            `<div class="detail-info"><p class="text-danger">${esc(err.detail)}</p></div>`;
        return;
    }

    const coverHtml = book.cover_path
        ? `<img class="detail-cover-img" src="/static/${esc(book.cover_path)}" alt="">`
        : `<div class="cover-placeholder cover-xl"><i class="fa-solid fa-book fa-flip-horizontal cover-icon" style="color:#aaa"></i></div>`;

    const avail = book.available > 0;
    const statusBadge = avail
        ? `<span class="status-badge status-available status-lg">${book.available} ${Lang.t('book.available')}</span>`
        : `<span class="status-badge status-loaned status-lg">${Lang.t('book.allLoaned')}</span>`;

    let actionHtml = '';
    if (book.user_loan_id) {
        actionHtml = `<a href="/return.html?loan_id=${book.user_loan_id}" class="btn btn-primary detail-action-btn">${Lang.t('book.returnThis')}</a>`;
    } else if (book.available > 0 && book.borrow_allowed) {
        actionHtml = `<a href="/borrow.html?isbn=${encodeURIComponent(isbn)}" class="btn btn-primary detail-action-btn">${Lang.t('book.borrow')}</a>`;
    } else {
        let tip;
        if (book.available === 0) {
            tip = Lang.t('book.reasonNoAvail');
        } else if (book.borrow_reason === 'account_locked') {
            tip = Lang.t('book.reasonLocked');
        } else if (book.borrow_reason === 'balance_low') {
            tip = Lang.t('book.balanceLow');
        } else {
            tip = Lang.t('book.loanLimit');
        }
        actionHtml = `<button class="btn btn-primary detail-action-btn" disabled style="opacity:.4;cursor:not-allowed" data-tip="${esc(tip)}">${Lang.t('book.borrow')}</button>`;
    }

    let loansHtml = '';
    if (book.loans_info && book.loans_info.length) {
        const rows = book.loans_info.map(l => `
            <div class="loan-row">
                <span class="loan-copy">${Lang.t('book.copyNum')} #${l.copy_num}</span>
                <span class="loan-due">${Lang.t('book.due')} ${esc(fmtDate(l.due_date))}</span>
                ${user.is_admin && l.borrower ? `<span class="loan-borrower">${esc(l.borrower)}</span>` : ''}
            </div>
        `).join('');
        loansHtml = `<div class="detail-loans">${rows}</div>`;
    }

    let brokenHtml = '';
    if (user.is_admin && book.copies && book.copies.length) {
        const opts = book.copies.filter(c => c.status !== 'broken').map(c =>
            `<option value="${c.id}">${Lang.t('book.copyNum')} #${c.copy_num} (${c.status})</option>`
        ).join('');
        if (opts) {
            brokenHtml = `
                <div class="detail-admin">
                    <div class="detail-admin-label">${Lang.t('book.admin')}</div>
                    <div class="broken-form">
                        <select id="broken-copy" class="form-input form-select" style="height:44px;font-size:14px">${opts}</select>
                        <input type="text" id="broken-note" class="form-input" placeholder="${Lang.t('book.noteHint')}" style="height:44px;font-size:14px">
                        <div class="broken-form-btns">
                            <button class="btn btn-danger" id="btn-broken">${Lang.t('book.markBroken')}</button>
                        </div>
                        <div id="broken-msg" class="text-danger" style="font-size:13px;display:none"></div>
                    </div>
                </div>
            `;
        }
    }

    const avgBadge = book.avg_rating
        ? `<span class="rating-badge" style="margin-left:6px" data-tip="${book.avg_rating}/9">${starsHtml(book.avg_rating)}</span>`
        : '';

    document.getElementById('detail-body').innerHTML = `
        <div class="detail-cover-wrap" style="flex-direction:column;gap:6px;align-items:flex-start">
            ${coverHtml}
            <div style="font-size:11px;color:var(--text-dim);word-break:break-all;max-width:160px;padding:0 2px">${esc(book.isbn)}</div>
        </div>
        <div class="detail-info">
            <div class="detail-title">${esc(book.title)}${book.subtitle ? `<span class="detail-subtitle"> — ${esc(book.subtitle)}</span>` : ''}</div>
            <div class="detail-author">${esc(book.author || '')}</div>
            <div class="detail-meta">${book.publisher ? esc(book.publisher) + (book.published ? ' · ' + esc(book.published) : '') : ''}</div>
            <div class="detail-meta">${Lang.t('book.loanRateLabel')} ${fmtEur(book.loan_rate || 0.5)}</div>
            <div class="detail-availability">${statusBadge}${avgBadge}</div>
            ${actionHtml}
            ${loansHtml}
            ${brokenHtml}
            <div id="rating-section"></div>
        </div>
        <div class="page-hint text-muted">
            <p>${Lang.t('book.borrowHint1')}</p>
            <p>${Lang.t('book.borrowHint2')}</p>
        </div>
    `;

    renderRatingSection(book, isbn);

    if (user.is_admin) {
        const btnBroken = document.getElementById('btn-broken');
        if (btnBroken) {
            btnBroken.addEventListener('click', async () => {
                const copy_id = document.getElementById('broken-copy').value;
                const note    = document.getElementById('broken-note').value;
                const msgEl   = document.getElementById('broken-msg');
                try {
                    await API.post(`/api/copies/${copy_id}/broken`, { broken_note: note });
                    window.location.href = `/book.html?isbn=${encodeURIComponent(isbn)}`;
                } catch (err) {
                    msgEl.textContent = err.detail || 'Failed';
                    msgEl.style.display = 'block';
                }
            });
        }
    }
}

function renderRatingSection(book, isbn) {
    const sec = document.getElementById('rating-section');
    if (!sec) return;

    // Show rating UI only if user has an active loan or an existing rating
    const canRate = book.user_loan_id || book.user_rating != null;
    if (!canRate) return;

    if (book.user_rating != null) {
        // Show existing rating with an edit button
        sec.innerHTML = `
            <div class="rating-section">
                <div class="rating-section-inline">
                    <span style="font-size:var(--text-sm);color:var(--text-muted)">${Lang.t('rating.yourRating')}:</span>
                    <span class="rating-badge" style="font-size:var(--text-base)">★ ${book.user_rating}</span>
                    <button class="btn btn-ghost btn-sm rating-edit-expand" id="btn-edit-rating">${Lang.t('rating.edit')}</button>
                </div>
                <div id="rating-edit-area" style="display:none;margin-top:10px"></div>
            </div>`;

        document.getElementById('btn-edit-rating').addEventListener('click', () => {
            const area = document.getElementById('rating-edit-area');
            if (area.style.display === 'none') {
                area.style.display = 'block';
                mountRatingEditor(area, book.user_rating, isbn);
                document.getElementById('btn-edit-rating').textContent = Lang.t('rating.skip');
            } else {
                area.style.display = 'none';
                document.getElementById('btn-edit-rating').textContent = Lang.t('rating.edit');
            }
        });
    } else {
        // User has active loan but no rating yet
        sec.innerHTML = `
            <div class="rating-section">
                <div class="rating-section-inline">
                    <span style="font-size:var(--text-sm);color:var(--text-muted)">${Lang.t('rating.rateThis')}</span>
                    <button class="btn btn-ghost btn-sm rating-edit-expand" id="btn-open-rating">${Lang.t('rating.rateThis')}</button>
                </div>
                <div id="rating-edit-area" style="display:none;margin-top:10px"></div>
            </div>`;

        document.getElementById('btn-open-rating').addEventListener('click', () => {
            const area = document.getElementById('rating-edit-area');
            if (area.style.display === 'none') {
                area.style.display = 'block';
                mountRatingEditor(area, 0, isbn);
                document.getElementById('btn-open-rating').style.display = 'none';
            }
        });
    }
}

function mountRatingEditor(container, initial, isbn) {
    container.innerHTML = `
        <div id="inline-slider"></div>
        <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary btn-sm flex-1" id="btn-rate-save">${Lang.t('rating.save')}</button>
        </div>
        <div id="rate-msg" style="font-size:var(--text-sm);margin-top:6px;display:none"></div>`;

    const slider = createRatingSlider(document.getElementById('inline-slider'), initial);

    document.getElementById('btn-rate-save').addEventListener('click', async () => {
        const v = slider.getValue();
        const msgEl = document.getElementById('rate-msg');
        try {
            await API.post(`/api/books/${encodeURIComponent(isbn)}/rate`, { rating: v });
            msgEl.className = 'text-success';
            msgEl.textContent = v > 0 ? Lang.t('rating.saved') + ' ★ ' + v : Lang.t('rating.skip');
            msgEl.style.display = 'block';
            // Refresh the section after a brief pause
            setTimeout(() => window.location.reload(), 800);
        } catch (err) {
            msgEl.className = 'text-danger';
            msgEl.textContent = err.detail || 'Error';
            msgEl.style.display = 'block';
        }
    });
}

init();
</script>
</body>
</html>

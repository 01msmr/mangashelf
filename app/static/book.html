<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Book</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="detail-page" id="page-root">
        <div class="detail-topbar">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="topbar-back"></a>
            <span class="detail-isbn" id="topbar-isbn"></span>
        </div>
        <div class="detail-body" id="detail-body">
            <div class="detail-info">
                <div class="text-muted" id="initial-loading"></div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function init() {
    await Lang.load();
    document.getElementById('topbar-back').textContent     = Lang.t('nav.allBooks');
    document.getElementById('initial-loading').textContent = Lang.t('empty.loading');
    const user = await initPage();
    const isbn = new URLSearchParams(location.search).get('isbn');
    if (!isbn) {
        document.getElementById('detail-body').innerHTML = `<div class="detail-info"><p>${Lang.t('borrow.noIsbn')}</p></div>`;
        return;
    }
    document.getElementById('topbar-isbn').textContent = isbn;

    let book;
    try {
        book = await API.get(`/api/books/${encodeURIComponent(isbn)}`);
    } catch (err) {
        if (handleAuthError(err)) return;
        document.getElementById('detail-body').innerHTML =
            `<div class="detail-info"><p class="text-danger">${esc(err.detail)}</p></div>`;
        return;
    }

    const coverHtml = book.cover_path
        ? `<img class="detail-cover-img" src="/static/${esc(book.cover_path)}" alt="">`
        : `<div class="cover-placeholder cover-xl"><i class="fa-solid fa-book fa-flip-horizontal cover-icon"></i></div>`;

    const avail = book.available > 0;
    const statusBadge = avail
        ? `<span class="status-badge status-available status-lg">${book.available} ${Lang.t('book.available')}</span>`
        : `<span class="status-badge status-loaned status-lg">${Lang.t('book.allLoaned')}</span>`;

    let actionHtml = '';
    if (book.user_loan_id) {
        actionHtml = `<a href="/return.html?loan_id=${book.user_loan_id}" class="btn btn-primary detail-action-btn">${Lang.t('book.returnThis')}</a>`;
    } else if (book.available > 0 && book.borrow_allowed) {
        actionHtml = `<a href="/borrow.html?isbn=${encodeURIComponent(isbn)}" class="btn btn-primary detail-action-btn">${Lang.t('book.borrow')}</a>`;
    } else if (!book.borrow_allowed && book.borrow_reason) {
        const msg = book.borrow_reason === 'balance_low' ? Lang.t('book.balanceLowLong') : Lang.t('book.loanLimit');
        actionHtml = `<div class="detail-borrow-blocked">${esc(msg)}</div>`;
    }

    let loansHtml = '';
    if (book.loans_info && book.loans_info.length) {
        const rows = book.loans_info.map(l => `
            <div class="loan-row">
                <span class="loan-copy">${Lang.t('book.copyNum')} #${l.copy_num}</span>
                <span class="loan-due">${Lang.t('book.due')} ${esc(fmtDate(l.due_date))}</span>
                ${user.is_admin && l.borrower ? `<span class="loan-borrower">${esc(l.borrower)}</span>` : ''}
            </div>
        `).join('');
        loansHtml = `<div class="detail-loans">${rows}</div>`;
    }

    let brokenHtml = '';
    if (user.is_admin && book.copies && book.copies.length) {
        const opts = book.copies.filter(c => c.status !== 'broken').map(c =>
            `<option value="${c.id}">${Lang.t('book.copyNum')} #${c.copy_num} (${c.status})</option>`
        ).join('');
        if (opts) {
            brokenHtml = `
                <div class="detail-admin">
                    <div class="detail-admin-label">${Lang.t('book.admin')}</div>
                    <div class="broken-form">
                        <select id="broken-copy" class="form-input form-select" style="height:44px;font-size:14px">${opts}</select>
                        <input type="text" id="broken-note" class="form-input" placeholder="${Lang.t('book.noteHint')}" style="height:44px;font-size:14px">
                        <div class="broken-form-btns">
                            <button class="btn btn-danger" id="btn-broken">${Lang.t('book.markBroken')}</button>
                        </div>
                        <div id="broken-msg" class="text-danger" style="font-size:13px;display:none"></div>
                    </div>
                </div>
            `;
        }
    }

    document.getElementById('detail-body').innerHTML = `
        <div class="detail-cover-wrap" style="flex-direction:column;gap:6px;align-items:flex-start">
            ${coverHtml}
            <div style="font-size:11px;color:var(--text-dim);word-break:break-all;max-width:160px;padding:0 2px">${esc(book.isbn)}</div>
        </div>
        <div class="detail-info">
            <div class="detail-title">${esc(book.title)}</div>
            <div class="detail-author">${esc(book.author || '')}</div>
            <div class="detail-meta">${book.publisher ? esc(book.publisher) + (book.published ? ' · ' + esc(book.published) : '') : ''}</div>
            <div class="detail-meta">${Lang.t('book.loanRateLabel')} ${(book.loan_rate || 0.5).toFixed(2)} €</div>
            <div class="detail-availability">${statusBadge}</div>
            ${actionHtml}
            ${loansHtml}
            ${brokenHtml}
        </div>
        <div class="page-hint text-muted">
            <p>${Lang.t('book.borrowHint1')}</p>
            <p>${Lang.t('book.borrowHint2')}</p>
        </div>
    `;

    if (user.is_admin) {
        const btnBroken = document.getElementById('btn-broken');
        if (btnBroken) {
            btnBroken.addEventListener('click', async () => {
                const copy_id = document.getElementById('broken-copy').value;
                const note    = document.getElementById('broken-note').value;
                const msgEl   = document.getElementById('broken-msg');
                try {
                    const res = await API.post(`/api/copies/${copy_id}/broken`, { broken_note: note });
                    if (res.book_removed) { window.location.href = '/index.html'; }
                    else { window.location.href = `/book.html?isbn=${encodeURIComponent(isbn)}`; }
                } catch (err) {
                    msgEl.textContent = err.detail || 'Failed';
                    msgEl.style.display = 'block';
                }
            });
        }
    }
}

init();
</script>
</body>
</html>

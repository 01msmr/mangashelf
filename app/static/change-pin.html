<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Change PIN</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">
<div class="page-center">
    <div class="pin-card">
        <div class="auth-title" id="page-title" style="margin-bottom:16px"></div>
        <div id="pin-step"></div>
        <div class="pin-actions mt-2">
            <a href="/account.html" class="btn btn-ghost flex-1 text-center" id="btn-cancel"></a>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/pin.js"></script>
<script>
let currentPinVal = '';
let newPinVal = '';

async function applyTranslations() {
    await Lang.load();
    document.getElementById('page-title').textContent  = Lang.t('changePin.title');
    document.getElementById('btn-cancel').textContent  = Lang.t('changePin.cancelBtn');
}

function watchDots(step, pf, onFull) {
    const obs = new MutationObserver(() => {
        if (pf.getValue().length === 4) { obs.disconnect(); setTimeout(onFull, 200); }
    });
    obs.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
}

function showStep1() {
    const step = document.getElementById('pin-step');
    const pf = makePinField(step, Lang.t('changePin.currentLabel'), 4);
    watchDots(step, pf, () => { currentPinVal = pf.getValue(); showStep2(); });
}

function showStep2() {
    const step = document.getElementById('pin-step');
    const pf = makePinField(step, Lang.t('changePin.newLabel'), 4);
    watchDots(step, pf, () => { newPinVal = pf.getValue(); showStep3(); });
}

function showStep3() {
    const step = document.getElementById('pin-step');
    const pf = makePinField(step, Lang.t('changePin.confirmLabel'), 4);
    watchDots(step, pf, async () => {
        const confirm = pf.getValue();
        if (confirm !== newPinVal) {
            pf.showError(Lang.t('setupPin.mismatch') || 'PINs do not match');
            pf.reset();
            return;
        }
        try {
            await API.post('/api/account/change-pin', {
                current_pin: currentPinVal,
                pin: newPinVal,
                pin_confirm: confirm,
            });
            window.location.href = '/account.html';
        } catch (err) {
            if (handleAuthError(err)) return;
            pf.showError(err.detail || 'Error');
            pf.reset();
        }
    });
}

applyTranslations().then(() => {
    initPage();
    showStep1();
});
</script>
</body>
</html>

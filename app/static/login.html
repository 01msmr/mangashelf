<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Login</title>
    <script src="/static/js/scale.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body class="login-page">

<!-- Language switcher — bottom right corner -->
<div class="lang-switcher-corner" id="login-lang-switcher"></div>

<!-- Register button — top right corner -->
<div class="register-corner">
    <span id="no-account-label" class="corner-label"></span>
    <a href="/register.html" class="btn btn-ghost btn-sm" id="register-link"></a>
</div>

<!-- User selection -->
<div id="screen-select" class="login-screen">
    <div class="login-title"><div class="app-logo"><span class="logo-badge"><img src="/static/img/kinoko.svg"></span>Manga<span id="logo-shelf-login">Shelf</span></div></div>
    <div class="login-subtitle" id="login-subtitle"></div>
    <div id="user-grid" class="user-grid">
        <div id="users-loading-msg" class="grid-empty-msg"></div>
    </div>
</div>

<!-- PIN entry overlay -->
<div class="pin-overlay" id="pin-overlay">
    <div class="pin-card">
        <div class="pin-card-label" id="pin-card-label"></div>
        <div class="pin-card-user" id="pin-username"></div>
        <div class="pin-error-spacer"><div id="pin-error" class="pin-error"></div></div>
        <div id="pin-step"></div>
        <div class="pin-actions">
            <button class="btn btn-ghost" id="btn-cancel"></button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
    <script src="/static/js/pin.js"></script>
<script src="/static/js/lang.js"></script>
<script>
let pinValue   = '';
let activeUser = '';

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

// Auto-redirect if already logged in
API.get('/api/auth/me').then(() => { window.location.href = '/index.html'; }).catch(() => {});

function renderLangSwitcher() {
    const switcher = document.getElementById('login-lang-switcher');
    switcher.innerHTML = ['en', 'de', 'schwaebisch'].map(l =>
        `<button class="lang-btn${Lang.current === l ? ' active' : ''}" data-lang="${l}">${l === 'schwaebisch' ? 'Schwob' : l.toUpperCase()}</button>`
    ).join('');
    switcher.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            Lang.set(btn.dataset.lang);
            renderLangSwitcher();
            applyTranslations();
        });
    });
}

async function applyTranslations() {
    await Lang.load();
    document.getElementById('logo-shelf-login').textContent = Lang.t('logo.shelf');
    document.getElementById('no-account-label').textContent = Lang.t('login.noAccount');
    document.getElementById('register-link').textContent    = Lang.t('login.register');
    document.getElementById('login-subtitle').textContent   = Lang.t('login.tapSubtitle');
    document.getElementById('users-loading-msg').textContent = Lang.t('login.loadingUsers');
    document.getElementById('pin-card-label').textContent   = Lang.t('login.enterPin');
    document.getElementById('btn-cancel').textContent       = Lang.t('login.cancel');
    renderLangSwitcher();
}

async function loadUsers() {
    try {
        const users = await API.get('/api/users');
        renderUsers(users);
    } catch (e) {
        document.getElementById('user-grid').innerHTML =
            `<div class="grid-empty-msg">${Lang.t('login.loadFailed')}</div>`;
    }
}

function renderUsers(users) {
    const grid = document.getElementById('user-grid');
    if (!users.length) {
        grid.innerHTML = `<div class="grid-empty-msg">${Lang.t('login.noUsers')}</div>`;
        return;
    }
    grid.innerHTML = users.map(u => `
        <div class="user-tile" onclick="openPin('${esc(u)}')">
            <div class="name">${esc(u)}</div>
        </div>
    `).join('');
}

// Shared PIN module — one instance, reset on each open.
let lockoutTimer = null;
let pinBusy = false;
const _pinStep = document.getElementById('pin-step');
const pf = makePinField(_pinStep, '', 4);
function _overlayActive() { return document.getElementById('pin-overlay').classList.contains('active'); }

new MutationObserver(() => {
    if (pinBusy || !_overlayActive()) return;
    if (pf.getValue().length === 4) { pinBusy = true; submitPin(); }
}).observe(_pinStep.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });

function openPin(username) {
    activeUser = username;
    pf.reset(); pinBusy = false;
    document.getElementById('pin-username').textContent = username;
    document.getElementById('pin-error').style.display = 'none';
    document.getElementById('pin-overlay').classList.add('active');
}

function closePinOverlay() {
    document.getElementById('pin-overlay').classList.remove('active');
    if (lockoutTimer) { clearTimeout(lockoutTimer); lockoutTimer = null; }
    pf.reset(); pinBusy = false;
}

function startLockoutCountdown(seconds) {
    const errEl = document.getElementById('pin-error');
    _pinStep.querySelectorAll('.pinpad-key').forEach(k => k.disabled = true);
    // Round up to nearest 5s step
    let remaining = Math.ceil(seconds / 5) * 5;
    function tick() {
        const m = Math.floor(remaining / 60);
        const s = String(remaining % 60).padStart(2, '0');
        errEl.textContent = Lang.t('login.waitTimer', { time: `${m}:${s}` });
        errEl.style.display = 'block';
        if (remaining <= 0) {
            _pinStep.querySelectorAll('.pinpad-key').forEach(k => k.disabled = false);
            errEl.style.display = 'none';
            pf.reset(); pinBusy = false;
            return;
        }
        remaining -= 5;
        lockoutTimer = setTimeout(tick, 5000);
    }
    tick();
}

async function submitPin() {
    if (pf.getValue().length !== 4) return;
    const errEl = document.getElementById('pin-error');
    errEl.style.display = 'none';
    try {
        const data = await API.post('/api/auth/login', { username: activeUser, pin: pf.getValue() });
        await API.post(`/api/account/language/${Lang.current}`).catch(() => {});
        closePinOverlay();
        if (data.setup_required) { window.location.href = '/setup-pin.html'; }
        else { window.location.href = '/index.html'; }
    } catch (err) {
        if (err.status === 429 && err.data?.wait_seconds) {
            startLockoutCountdown(err.data.wait_seconds);
        } else {
            errEl.textContent = err.detail || Lang.t('login.failed');
            errEl.style.display = 'block';
            pf.reset(); pinBusy = false;
        }
    }
}

document.getElementById('btn-cancel').addEventListener('click', closePinOverlay);

document.addEventListener('keydown', e => {
    if (!_overlayActive()) return;
    if (e.key === 'Escape') { e.preventDefault(); closePinOverlay(); }
});

document.getElementById('pin-overlay').addEventListener('pointerdown', e => {
    if (e.target === document.getElementById('pin-overlay')) closePinOverlay();
});

applyTranslations().then(loadUsers);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body class="login-page">

<!-- Register button — top right corner -->
<div class="register-corner">
    <span style="font-size:13px;color:var(--text-muted);margin-right:10px">No account yet?</span>
    <a href="/register.html" class="btn btn-ghost btn-sm">Register</a>
</div>

<!-- User selection -->
<div id="screen-select" class="login-screen">
    <div class="login-title"><div class="app-logo"><span class="logo-badge"><img src="/static/img/kinoko.svg"></span>Manga<span>Shelf</span></div></div>
    <div class="login-subtitle">Tap your name to log in</div>
    <div id="user-grid" class="user-grid">
        <div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">Loading users…</div>
    </div>
</div>

<!-- PIN entry overlay -->
<div class="pin-overlay" id="pin-overlay">
    <div class="pin-card">
        <div class="pin-card-label">Enter PIN</div>
        <div class="pin-card-user" id="pin-username"></div>
        <div style="min-height:36px"><div id="pin-error" class="pin-error"></div></div>
        <input type="password" id="pin-text-input" class="pin-text-input"
               inputmode="none" maxlength="4" placeholder="••••" autocomplete="off">
        <div class="pinpad-grid">
            <button class="pinpad-key" data-key="1" type="button">1</button>
            <button class="pinpad-key" data-key="2" type="button">2</button>
            <button class="pinpad-key" data-key="3" type="button">3</button>
            <button class="pinpad-key" data-key="4" type="button">4</button>
            <button class="pinpad-key" data-key="5" type="button">5</button>
            <button class="pinpad-key" data-key="6" type="button">6</button>
            <button class="pinpad-key" data-key="7" type="button">7</button>
            <button class="pinpad-key" data-key="8" type="button">8</button>
            <button class="pinpad-key" data-key="9" type="button">9</button>
            <button class="pinpad-key" data-key="clear" type="button">C</button>
            <button class="pinpad-key" data-key="0" type="button">0</button>
            <button class="pinpad-key" data-key="back" type="button">⌫</button>
        </div>
        <div class="pin-actions">
            <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
let pinValue   = '';
let activeUser = '';

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

// Auto-redirect if already logged in
API.get('/api/auth/me').then(() => { window.location.href = '/index.html'; }).catch(() => {});

async function loadUsers() {
    try {
        const users = await API.get('/api/users');
        renderUsers(users);
    } catch (e) {
        document.getElementById('user-grid').innerHTML =
            '<div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">Could not load users.</div>';
    }
}

function renderUsers(users) {
    const grid = document.getElementById('user-grid');
    if (!users.length) {
        grid.innerHTML = '<div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">No users yet.</div>';
        return;
    }
    grid.innerHTML = users.map(u => `
        <div class="user-tile" onclick="openPin('${esc(u)}')">
            <div class="name">${esc(u)}</div>
        </div>
    `).join('');
}

function openPin(username) {
    activeUser = username;
    pinValue   = '';
    document.getElementById('pin-username').textContent = username;
    document.getElementById('pin-error').style.display = 'none';
    document.getElementById('pin-text-input').value = '';
    document.getElementById('pin-overlay').classList.add('active');
    document.getElementById('pin-text-input').focus();
}

function closePinOverlay() {
    document.getElementById('pin-overlay').classList.remove('active');
    pinValue = '';
    document.getElementById('pin-text-input').value = '';
}

function updateInput() {
    document.getElementById('pin-text-input').value = pinValue;
}

let lockoutTimer = null;

function startLockoutCountdown(seconds) {
    const errEl = document.getElementById('pin-error');
    document.querySelectorAll('.pinpad-key').forEach(k => k.disabled = true);
    document.getElementById('pin-text-input').disabled = true;
    // Round up to nearest 5s step
    let remaining = Math.ceil(seconds / 5) * 5;
    function tick() {
        const m = Math.floor(remaining / 60);
        const s = String(remaining % 60).padStart(2, '0');
        errEl.textContent = `Wrong attempts — wait ${m}:${s}`;
        errEl.style.display = 'block';
        if (remaining <= 0) {
            document.querySelectorAll('.pinpad-key').forEach(k => k.disabled = false);
            document.getElementById('pin-text-input').disabled = false;
            errEl.style.display = 'none';
            pinValue = ''; updateInput();
            return;
        }
        remaining -= 5;
        lockoutTimer = setTimeout(tick, 5000);
    }
    tick();
}

async function submitPin() {
    if (pinValue.length !== 4) return;
    const errEl = document.getElementById('pin-error');
    errEl.style.display = 'none';
    try {
        const data = await API.post('/api/auth/login', { username: activeUser, pin: pinValue });
        closePinOverlay();
        if (data.setup_required) { window.location.href = '/setup-pin.html'; }
        else { window.location.href = '/index.html'; }
    } catch (err) {
        if (err.status === 429 && err.data?.wait_seconds) {
            startLockoutCountdown(err.data.wait_seconds);
        } else {
            errEl.textContent = err.detail || 'Login failed.';
            errEl.style.display = 'block';
        }
        pinValue = ''; updateInput();
    }
}

// Numpad key clicks
document.querySelectorAll('.pinpad-key').forEach(btn => {
    btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        const key = btn.dataset.key;
        if (key === 'back')        { pinValue = pinValue.slice(0, -1); }
        else if (key === 'clear')  { pinValue = ''; }
        else if (pinValue.length < 4) { pinValue += key; }
        updateInput();
        if (pinValue.length === 4) setTimeout(submitPin, 150);
    });
});

// Physical keyboard / direct input on the text field
document.getElementById('pin-text-input').addEventListener('input', function() {
    const v = this.value.replace(/\D/g, '').slice(0, 4);
    pinValue = v;
    this.value = v;
    if (pinValue.length === 4) setTimeout(submitPin, 150);
});

document.getElementById('btn-cancel').addEventListener('click', closePinOverlay);

document.addEventListener('keydown', e => {
    if (!document.getElementById('pin-overlay').classList.contains('active')) return;
    if (e.key === 'Escape') closePinOverlay();
});

document.getElementById('pin-overlay').addEventListener('pointerdown', e => {
    if (e.target === document.getElementById('pin-overlay')) closePinOverlay();
});

loadUsers();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaStore — Login</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { overflow: auto; }

        /* ── User selection screen ───────────────── */
        .login-screen {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; padding: 32px 20px 20px;
            gap: 24px;
        }
        .login-title { font-size: 26px; font-weight: 800; text-align: center; }
        .login-title span { color: var(--primary); }
        .login-subtitle { color: var(--text-muted); font-size: 14px; margin-top: -12px; }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            width: 100%; max-width: 720px;
        }
        .user-tile {
            background: var(--surface); border: 2px solid var(--border);
            border-radius: var(--radius-xl); padding: 20px 12px;
            text-align: center; cursor: pointer;
            transition: border-color var(--transition), background var(--transition);
            user-select: none; -webkit-user-select: none;
        }
        .user-tile:hover, .user-tile:active { border-color: var(--primary); background: var(--primary-dim); }
        .user-tile .avatar {
            width: 52px; height: 52px; border-radius: 50%;
            background: var(--surface-3); margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; font-weight: 700; color: var(--primary);
        }
        .user-tile .name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .register-link { color: var(--text-muted); font-size: 14px; }
        .register-link a { color: var(--primary); text-decoration: none; }

        /* ── PIN entry overlay ───────────────────── */
        .pin-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 300;
            background: rgba(13,13,26,.92);
            align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
        }
        .pin-overlay.active { display: flex; }
        .pin-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-xl); padding: 32px 36px;
            width: 100%; max-width: 340px; text-align: center;
            box-shadow: var(--shadow);
        }
        .pin-card h2 { font-size: 18px; margin-bottom: 6px; }
        .pin-card .sub { color: var(--text-muted); font-size: 13px; margin-bottom: 20px; }
        .auth-error {
            background: rgba(230,57,70,.15); border: 1px solid var(--primary);
            color: var(--primary); border-radius: var(--radius);
            padding: 9px 14px; font-size: 13px; margin-bottom: 14px; display: none;
        }
        .pin-dots { display: flex; justify-content: center; gap: 14px; margin-bottom: 20px; }
        .pin-dot {
            width: 16px; height: 16px; border-radius: 50%;
            border: 2px solid var(--border); background: transparent;
            transition: background var(--transition), border-color var(--transition);
        }
        .pin-dot.filled { background: var(--primary); border-color: var(--primary); }

        .pinpad-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            margin-bottom: 16px;
        }
        .pinpad-key {
            background: var(--surface-2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px 0; font-size: 20px;
            font-weight: 700; color: var(--text); cursor: pointer;
            transition: background var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .pinpad-key:hover, .pinpad-key:active { background: var(--surface-3); border-color: var(--primary); }
        .pinpad-key.back { font-size: 16px; }
        .pin-actions { display: flex; gap: 10px; }
        .pin-actions .btn { flex: 1; }
    </style>
</head>
<body>

<!-- User selection -->
<div id="screen-select" class="login-screen">
    <div class="login-title">Manga<span>Store</span></div>
    <div class="login-subtitle">Tap your name to log in</div>
    <div id="user-grid" class="user-grid">
        <div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">Loading users…</div>
    </div>
    <div class="register-link">New here? <a href="/register.html">Create account</a></div>
</div>

<!-- PIN entry overlay -->
<div class="pin-overlay" id="pin-overlay">
    <div class="pin-card">
        <h2 id="pin-username"></h2>
        <div class="sub">Enter your PIN</div>
        <div id="pin-error" class="auth-error"></div>
        <div class="pin-dots">
            <div class="pin-dot" id="d0"></div>
            <div class="pin-dot" id="d1"></div>
            <div class="pin-dot" id="d2"></div>
            <div class="pin-dot" id="d3"></div>
        </div>
        <div class="pinpad-grid">
            <button class="pinpad-key" data-key="1" type="button">1</button>
            <button class="pinpad-key" data-key="2" type="button">2</button>
            <button class="pinpad-key" data-key="3" type="button">3</button>
            <button class="pinpad-key" data-key="4" type="button">4</button>
            <button class="pinpad-key" data-key="5" type="button">5</button>
            <button class="pinpad-key" data-key="6" type="button">6</button>
            <button class="pinpad-key" data-key="7" type="button">7</button>
            <button class="pinpad-key" data-key="8" type="button">8</button>
            <button class="pinpad-key" data-key="9" type="button">9</button>
            <button class="pinpad-key back" data-key="clear" type="button">C</button>
            <button class="pinpad-key" data-key="0" type="button">0</button>
            <button class="pinpad-key back" data-key="back" type="button">⌫</button>
        </div>
        <div class="pin-actions">
            <button class="btn btn-ghost" id="btn-cancel">Cancel</button>
        </div>
    </div>
</div>

<script src="/static/js/api.js"></script>
<script>
let pinValue   = '';
let activeUser = '';

// Auto-redirect if already logged in
API.get('/api/auth/me').then(() => { window.location.href = '/index.html'; }).catch(() => {});

// Load user list
async function loadUsers() {
    try {
        const users = await API.get('/api/users');
        renderUsers(users);
    } catch (e) {
        document.getElementById('user-grid').innerHTML =
            '<div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">Could not load users.</div>';
    }
}

function renderUsers(users) {
    const grid = document.getElementById('user-grid');
    if (!users.length) {
        grid.innerHTML = '<div style="color:var(--text-muted);grid-column:1/-1;text-align:center;padding:20px">No users yet.</div>';
        return;
    }
    grid.innerHTML = users.map(u => `
        <div class="user-tile" onclick="openPin('${esc(u)}')">
            <div class="avatar">${esc(u.charAt(0).toUpperCase())}</div>
            <div class="name">${esc(u)}</div>
        </div>
    `).join('');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;'); }

function openPin(username) {
    activeUser = username;
    pinValue   = '';
    document.getElementById('pin-username').textContent = username;
    document.getElementById('pin-error').style.display = 'none';
    updateDots();
    document.getElementById('pin-overlay').classList.add('active');
}

function closePinOverlay() {
    document.getElementById('pin-overlay').classList.remove('active');
    pinValue = '';
}

function updateDots() {
    for (let i = 0; i < 4; i++) {
        document.getElementById(`d${i}`).classList.toggle('filled', i < pinValue.length);
    }
}

let lockoutTimer = null;

function startLockoutCountdown(seconds) {
    const errEl = document.getElementById('pin-error');
    // Disable all numpad keys
    document.querySelectorAll('.pinpad-key').forEach(k => k.disabled = true);
    let remaining = seconds;
    function tick() {
        const m = Math.floor(remaining / 60);
        const s = String(remaining % 60).padStart(2, '0');
        errEl.textContent = `Too many failed attempts. Wait ${m}:${s}…`;
        errEl.style.display = 'block';
        if (remaining <= 0) {
            document.querySelectorAll('.pinpad-key').forEach(k => k.disabled = false);
            errEl.style.display = 'none';
            pinValue = ''; updateDots();
            return;
        }
        remaining--;
        lockoutTimer = setTimeout(tick, 1000);
    }
    tick();
}

async function submitPin() {
    if (pinValue.length !== 4) return;
    const errEl = document.getElementById('pin-error');
    errEl.style.display = 'none';
    try {
        const data = await API.post('/api/auth/login', { username: activeUser, pin: pinValue });
        closePinOverlay();
        if (data.setup_required) { window.location.href = '/setup-pin.html'; }
        else { window.location.href = '/index.html'; }
    } catch (err) {
        if (err.status === 429 && err.data?.wait_seconds) {
            startLockoutCountdown(err.data.wait_seconds);
        } else {
            errEl.textContent = err.detail || 'Login failed.';
            errEl.style.display = 'block';
        }
        pinValue = '';
        updateDots();
    }
}

// PIN pad key clicks
document.querySelectorAll('.pinpad-key').forEach(btn => {
    btn.addEventListener('pointerdown', e => {
        e.preventDefault();
        const key = btn.dataset.key;
        if (key === 'back') {
            pinValue = pinValue.slice(0, -1);
        } else if (key === 'clear') {
            pinValue = '';
        } else if (pinValue.length < 4) {
            pinValue += key;
        }
        updateDots();
        if (pinValue.length === 4) setTimeout(submitPin, 150);
    });
});

document.getElementById('btn-cancel').addEventListener('click', closePinOverlay);

// Physical keyboard support
document.addEventListener('keydown', e => {
    if (!document.getElementById('pin-overlay').classList.contains('active')) return;
    if (e.key >= '0' && e.key <= '9' && pinValue.length < 4) { pinValue += e.key; updateDots(); if (pinValue.length === 4) setTimeout(submitPin, 150); }
    else if (e.key === 'Backspace') { pinValue = pinValue.slice(0, -1); updateDots(); }
    else if (e.key === 'Escape') closePinOverlay();
});

loadUsers();
</script>
</body>
</html>

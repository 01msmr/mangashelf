<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Return</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main">
    <div class="action-page">
        <div class="detail-topbar">
            <a href="/index.html" class="btn btn-ghost btn-sm" id="topbar-back"></a>
            <span class="page-topbar-title" id="topbar-title"></span>
        </div>
        <div class="action-body" id="action-body">
            <div class="action-panel">
                <div class="text-muted" id="initial-loading"></div>
            </div>
        </div>
    </div>
</main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/rating.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function init() {
    await Lang.load();
    document.getElementById('topbar-back').textContent  = Lang.t('nav.allBooks');
    document.getElementById('topbar-title').textContent = Lang.t('return.title');
    document.getElementById('initial-loading').textContent = Lang.t('empty.loading');
    await initPage();
    const loanId = new URLSearchParams(location.search).get('loan_id');
    if (!loanId) { document.getElementById('action-body').innerHTML = `<div class="action-panel"><p>${Lang.t('return.noLoanId')}</p></div>`; return; }

    let info;
    try {
        info = await API.get(`/api/return/${loanId}`);
    } catch (err) {
        if (handleAuthError(err)) return;
        document.getElementById('action-body').innerHTML =
            `<div class="action-panel"><div class="text-danger">${esc(err.detail)}</div></div>`;
        return;
    }

    const coverHtml = info.book.cover_path
        ? `<img class="detail-cover-img" src="/static/${esc(info.book.cover_path)}" alt="">`
        : `<div class="cover-placeholder cover-xl"><i class="fa-solid fa-book fa-flip-horizontal cover-icon"></i></div>`;

    const now = new Date().toISOString();
    const overdue = info.due_date < now;
    const overdueBadge = overdue
        ? `<span class="overdue-badge" style="display:inline-block;margin-bottom:8px">${Lang.t('return.overdue')}</span>`
        : '';

    document.getElementById('action-body').innerHTML = `
        <div class="action-cover">${coverHtml}</div>
        <div class="action-panel">
            <div class="action-title">${esc(info.book.title)}</div>
            <div class="action-subtitle">${esc(info.book.author || '')}</div>
            ${overdueBadge}
            <div class="action-details">
                <div class="detail-row">
                    <span class="dr-label">${Lang.t('return.dueDate')}</span>
                    <span class="dr-value${overdue ? ' text-danger' : ''}">${esc(fmtDate(info.due_date))}</span>
                </div>
            </div>
            <div class="action-buttons">
                <button class="btn btn-primary flex-1" id="btn-return">${Lang.t('return.confirmBtn')}</button>
                <a href="/index.html" class="btn btn-ghost">${Lang.t('return.cancelBtn')}</a>
            </div>
        </div>
        <div class="page-hint text-muted">
            <p>${Lang.t('return.hint1')}</p>
            <p>${Lang.t('return.hint2')}</p>
        </div>
    `;

    document.getElementById('btn-return').addEventListener('click', async () => {
        try {
            const res = await API.post(`/api/return/${loanId}`);
            showRatingStep(info.book, coverHtml, res.message);
        } catch (err) {
            if (handleAuthError(err)) return;
            alert(err.detail || Lang.t('return.noLoanId'));
        }
    });
}

function showRatingStep(book, coverHtml, successMsg) {
    // Fetch the user's existing rating for this book (if any) before showing the slider
    API.get(`/api/books/${encodeURIComponent(book.isbn)}`).then(detail => {
        renderRatingPanel(book, coverHtml, successMsg, detail.user_rating || 0);
    }).catch(() => {
        renderRatingPanel(book, coverHtml, successMsg, 0);
    });
}

function renderRatingPanel(book, coverHtml, successMsg, existingRating) {
    document.getElementById('action-body').innerHTML = `
        <div class="action-cover">${coverHtml}</div>
        <div class="action-panel">
            <div class="action-title text-success">${Lang.t('return.success')}</div>
            <div class="action-subtitle text-sm text-muted">${Lang.t('rating.howWas')}</div>
            <div class="rating-widget">
                <div class="rating-widget-title">${existingRating > 0 ? Lang.t('rating.yourRating') + ': ★ ' + existingRating : ''}</div>
                <div id="slider-container"></div>
            </div>
            <div class="action-buttons mt-1">
                <button class="btn btn-primary flex-1" id="btn-save-rating">${Lang.t('rating.save')}</button>
                <a href="/index.html" class="btn btn-ghost">${Lang.t('rating.skip')}</a>
            </div>
        </div>`;

    const slider = createRatingSlider(
        document.getElementById('slider-container'),
        existingRating
    );

    document.getElementById('btn-save-rating').addEventListener('click', async () => {
        const v = slider.getValue();
        if (v > 0) {
            try { await API.post(`/api/books/${encodeURIComponent(book.isbn)}/rate`, { rating: v }); }
            catch (_) { /* non-critical — navigate anyway */ }
        }
        window.location.href = '/index.html';
    });
}

init();
</script>
</body>
</html>

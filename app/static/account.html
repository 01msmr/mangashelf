<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Account</title>
    <script src="/static/js/scale.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main" id="main-content"></main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/pin.js"></script>
<script src="/static/js/rating.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTxnType(t) {
    if (t.type === 'loan' && (t.description || '').includes('donor')) return Lang.t('txn.loanFree');
    return Lang.t('txn.' + t.type) || t.type;
}
function fmtTxnDetail(t) {
    if (t.type === 'entry_fee') return Lang.t('txn.entry_fee_detail');
    const m = (t.description || '').match(/^[^:]+:\s*(.+)$/);
    return m ? m[1] : (t.description || '');
}

let _cachedAccountData = null;
let _cachedUser = null;
let _txnFilter = 'all'; // 'all' | 'books' | 'money'

function isTxnBook(t)  { return t.type === 'loan' || t.type === 'return'; }
function isTxnMoney(t) { return !isTxnBook(t); }

async function tryLoadAccount() {
    try {
        const data = await API.get('/api/account');
        _cachedAccountData = data;
        renderAccount(data);
    } catch (err) {
        if (err.status === 403) {
            renderVerify();
        } else if (handleAuthError(err)) {
            // redirected
        } else {
            document.getElementById('main-content').innerHTML =
                `<p class="text-danger p-6">${esc(err.detail)}</p>`;
        }
    }
}

function renderVerify() {
    document.getElementById('main-content').innerHTML = `
        <div class="flex items-center justify-center flex-1">
            <div class="pin-card">
                <div class="pin-card-label" id="verify-label"></div>
                <div class="pin-card-user" id="verify-subtitle"></div>
                <div id="verify-error" class="pin-error" style="display:none;margin-bottom:8px"></div>
                <div id="verify-pin-step"></div>
                <div class="pin-actions">
                    <button class="btn btn-ghost" id="verify-cancel"></button>
                </div>
            </div>
        </div>
    `;
    document.getElementById('verify-label').textContent    = Lang.t('acct.verify.title');
    document.getElementById('verify-subtitle').textContent = Lang.t('acct.verify.subtitle');
    document.getElementById('verify-cancel').textContent   = Lang.t('adminPin.cancel');
    document.getElementById('verify-cancel').addEventListener('click', () => { window.location.href = '/index.html'; });

    const step = document.getElementById('verify-pin-step');
    const pf = makePinField(step, '', 4);

    const errEl = document.getElementById('verify-error');
    let busy = false;

    // Auto-submit at 4 digits (on-screen taps and physical keyboard both update
    // the dots). Stays armed so a retry after a wrong PIN still works.
    const obs = new MutationObserver(async () => {
        if (busy || pf.getValue().length !== 4) return;
        busy = true;
        errEl.style.display = 'none';
        try {
            await API.post('/api/account/verify', { pin: pf.getValue() });
            obs.disconnect();
            tryLoadAccount();
        } catch (err) {
            errEl.textContent = err.detail || Lang.t('acct.verify.wrongPin');
            errEl.style.display = 'block';
            pf.reset();
            busy = false;
        }
    });
    obs.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });
}

function showQr(src) {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<img src="${src}" class="overlay-img">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
    document.body.appendChild(overlay);
}

function renderAccount(data) {
    const balClass = data.balance_status === 'ok' ? 'balance-ok'
                   : data.balance_status === 'warn' ? 'balance-warn'
                   : 'balance-danger';
    const balHint  = data.balance_status === 'ok'  ? Lang.t('acct.canBorrow')
                   : data.balance_status === 'warn' ? Lang.t('acct.warnFunds', { min: fmtEur(data.borrow_min).replace(' €','') })
                   : Lang.t('acct.empty');

    const topupBtns = [1, 2, 5, 10, 20].map(a =>
        `<button class="btn btn-ghost topup-btn" data-amount="${a}">${a} €</button>`
    ).join('');
    const topupUndoBtns = [1, 2, 5, 10, 20].map(a =>
        `<button class="btn btn-danger topup-undo-btn" data-amount="${a}" style="visibility:hidden">${Lang.t('acct.topupUndo')} (8)</button>`
    ).join('');

    const loansHtml = data.active_loans.length
        ? data.active_loans.map(l => {
            const overdue = l.overdue;
            return `
                <div class="loan-card${overdue ? ' loan-overdue' : ''}">
                    <div class="loan-card-info">
                        <div class="loan-card-title">
                            <a href="${l.book_series
                                ? `/index.html?series=${encodeURIComponent(l.book_title)}&highlight=${encodeURIComponent(l.book_isbn)}`
                                : `/index.html?highlight=${encodeURIComponent(l.book_isbn)}`
                            }" class="link-plain">${esc(l.book_title)}</a>
                        </div>
                    </div>
                    <div class="loan-card-right">
                        <div class="loan-card-due${overdue ? ' text-danger' : ''}">
                            ${overdue ? '⚠ ' : ''}${Lang.t('acct.due')} ${esc(fmtDate(l.due_date))}
                        </div>
                        ${overdue ? `<span class="overdue-badge">${Lang.t('return.overdue')}</span>` : ''}
                        <span id="return-wrap-${l.id}">
                            <button class="btn btn-ghost btn-sm mt-1" onclick="confirmReturn(${l.id}, '${esc(l.book_isbn)}')">${Lang.t('book.return')}</button>
                        </span>
                    </div>
                </div>
            `;
        }).join('')
        : `<div class="acct-empty">${Lang.t('acct.noLoans')}</div>`;

    const bookCount  = data.recent_txns.filter(isTxnBook).length;
    const moneyCount = data.recent_txns.filter(isTxnMoney).length;

    function txnRowHtml(t) {
        const cls = t.amount > 0 ? 'txn-credit' : t.amount < 0 ? 'txn-debit' : 'txn-neutral';
        const amtStr = t.amount !== 0 ? (t.amount > 0 ? '+' : '') + fmtEur(t.amount) : '—';
        return `<div class="txn-row">
            <span class="txn-date">${esc(fmtDate(t.created_at))}</span>
            <div class="txn-desc">
                <span class="txn-type">${esc(fmtTxnType(t))}</span>
                <span class="txn-detail">${esc(fmtTxnDetail(t))}</span>
            </div>
            <span class="txn-amount ${cls}">${amtStr}</span>
        </div>`;
    }

    function buildTxnHtml(filter) {
        const subset = filter === 'books' ? data.recent_txns.filter(isTxnBook)
                     : filter === 'money' ? data.recent_txns.filter(isTxnMoney)
                     : data.recent_txns;
        return subset.length
            ? `<div class="txn-list">${subset.map(txnRowHtml).join('')}</div>`
            : `<div class="acct-empty">${Lang.t('acct.noTxns')}</div>`;
    }

    document.getElementById('main-content').innerHTML = `
        <div class="acct-page">
            <div class="lang-switcher-row">
                <a href="/change-pin.html" class="btn btn-ghost btn-sm">${Lang.t('acct.changePin')}</a>
            </div>
            <div class="acct-body">
                <div class="flex items-stretch">
                    <div class="acct-section flex-1">
                        <div class="acct-section-title">${Lang.t('acct.balance')}</div>
                        <div class="balance-card ${balClass}">
                            <span class="balance-label">${Lang.t('acct.balance')}</span>
                            <span class="balance-amount">${fmtEur(data.guthaben)}</span>
                            <span class="balance-hint">${balHint}</span>
                        </div>
                    </div>
                    <div class="acct-section acct-qr-section"
                         onclick="showQr('/user-qr/${data.id}.png')">
                        <div class="acct-section-title">${Lang.t('acct.phone')}</div>
                        <img src="/user-qr/${data.id}.png" alt="QR" class="acct-qr-img"
                             onerror="this.style.display='none'">
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.addFunds')}</div>
                    <div class="topup-form">
                        <div class="topup-hint">${Lang.t('acct.cashHint')}</div>
                        <div class="topup-presets">${topupBtns}</div>
                        <div class="topup-undo-row">${topupUndoBtns}</div>
                        <div id="topup-msg" class="text-sm" style="display:none"></div>
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.loans')}
                        ${data.active_loans.length ? `<span class="acct-count">${data.active_loans.length}</span>` : ''}
                    </div>
                    <div class="loan-list">${loansHtml}</div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.activity')}
                        ${data.recent_txns.length ? `<span class="acct-count">${data.recent_txns.length}</span>` : ''}
                        <button class="txn-filter-btn${_txnFilter==='all'?' active':''}" data-txn-filter="all">${Lang.t('acct.txnAll')}</button>
                        <button class="txn-filter-btn${_txnFilter==='books'?' active':''}" data-txn-filter="books">${Lang.t('acct.txnBooks')} (${bookCount})</button>
                        <button class="txn-filter-btn${_txnFilter==='money'?' active':''}" data-txn-filter="money">${Lang.t('acct.txnMoney')} (${moneyCount})</button>
                    </div>
                    <div id="txn-list-wrap">${buildTxnHtml(_txnFilter)}</div>
                </div>

            </div>
        </div>
    `;

    let _undoTimer = null;
    const hideUndoBtns = () => document.querySelectorAll('.topup-undo-btn').forEach(b => b.style.visibility = 'hidden');

    document.querySelectorAll('.topup-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const amount = parseFloat(btn.dataset.amount);
            const msgEl  = document.getElementById('topup-msg');
            msgEl.style.display = 'none';
            try {
                await API.post('/api/account/topup', { amount });
                if (_undoTimer) { clearInterval(_undoTimer); _undoTimer = null; }
                hideUndoBtns();
                const undoBtn = document.querySelector(`.topup-undo-btn[data-amount="${amount}"]`);
                undoBtn.style.visibility = 'visible';
                const endTime = Date.now() + getMsgDuration();
                undoBtn.textContent = `${Lang.t('acct.topupUndo')} (${Math.ceil(getMsgDuration()/1000)})`;
                _undoTimer = setInterval(() => {
                    const remaining = Math.ceil((endTime - Date.now()) / 1000);
                    if (remaining <= 0) {
                        clearInterval(_undoTimer); _undoTimer = null;
                        hideUndoBtns();
                        tryLoadAccount();
                    } else {
                        undoBtn.textContent = `${Lang.t('acct.topupUndo')} (${remaining})`;
                    }
                }, 500);
            } catch (err) {
                msgEl.className = 'text-danger text-sm';
                msgEl.textContent = err.detail || Lang.t('acct.addFunds');
                msgEl.style.display = 'block';
            }
        });
    });

    document.querySelectorAll('.topup-undo-btn').forEach(undoBtn => {
        undoBtn.addEventListener('click', async () => {
            if (_undoTimer) { clearInterval(_undoTimer); _undoTimer = null; }
            hideUndoBtns();
            const msgEl = document.getElementById('topup-msg');
            try {
                await API.post('/api/account/topup/undo');
                setTimeout(tryLoadAccount, 800);
            } catch (e) {
                msgEl.className = 'text-danger text-sm';
                msgEl.textContent = e.detail || Lang.t('common.error');
                msgEl.style.display = 'block';
                setTimeout(tryLoadAccount, 1500);
            }
        });
    });

    document.querySelectorAll('.txn-filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const f = btn.dataset.txnFilter;
            _txnFilter = (f === 'all' || _txnFilter === f) ? 'all' : f;
            document.querySelectorAll('.txn-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.txnFilter === _txnFilter));
            document.getElementById('txn-list-wrap').innerHTML = buildTxnHtml(_txnFilter);
        });
    });
}

function confirmReturn(loanId, isbn) {
    const wrap = document.getElementById(`return-wrap-${loanId}`);
    if (!wrap) return;
    wrap.innerHTML = `
        <span class="inline-flex items-center gap-1 mt-1">
            <span class="text-danger text-sm">${Lang.t('acct.confirmReturn')}</span>
            <button class="btn btn-ghost btn-sm" onclick="doReturn(${loanId}, '${esc(isbn)}')">${Lang.t('adminUsers.confirmYes')}</button>
            <button class="btn btn-ghost btn-sm" onclick="tryLoadAccount()">${Lang.t('adminUsers.confirmNo')}</button>
        </span>`;
}

async function doReturn(loanId, isbn) {
    try {
        await API.post(`/api/return/${loanId}`);
        // Offer to rate the just-returned book, then refresh.
        if (isbn) promptRating(isbn, tryLoadAccount);
        else tryLoadAccount();
    } catch (err) {
        const wrap = document.getElementById(`return-wrap-${loanId}`);
        if (wrap) wrap.innerHTML = `<span class="text-danger text-sm">${esc(err.detail || Lang.t('common.error'))}</span>`;
    }
}

async function init() {
    await Lang.load();
    _cachedUser = await initPage();
    tryLoadAccount();
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Account</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main" id="main-content"></main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _cachedAccountData = null;
let _cachedUser = null;

async function tryLoadAccount() {
    try {
        const data = await API.get('/api/account');
        _cachedAccountData = data;
        renderAccount(data);
    } catch (err) {
        if (err.status === 403) {
            renderVerify();
        } else if (handleAuthError(err)) {
            // redirected
        } else {
            document.getElementById('main-content').innerHTML =
                `<p style="padding:24px" class="text-danger">${esc(err.detail)}</p>`;
        }
    }
}

function renderVerify() {
    document.getElementById('main-content').innerHTML = `
        <div class="auth-page">
            <div class="hint-aside-row">
                <div class="auth-card">
                    <div class="auth-title">${Lang.t('acct.verify.title')}</div>
                    <div class="auth-subtitle">${Lang.t('acct.verify.subtitle')}</div>
                    <div id="verify-error" class="auth-error" style="display:none"></div>
                    <div class="auth-form">
                        <input type="password" id="verify-pin" class="form-input form-input-pin"
                               inputmode="none" maxlength="4" placeholder="••••">
                        <button class="btn btn-primary btn-block" id="btn-verify">${Lang.t('acct.verify.btn')}</button>
                    </div>
                </div>
                <div class="hint text-muted">
                    <p>${Lang.t('acct.verify.hint1')}</p>
                    <p>${Lang.t('acct.verify.hint2')}</p>
                </div>
            </div>
        </div>
    `;

    const pinEl = document.getElementById('verify-pin');
    pinEl.focus();

    async function doVerify() {
        const pin   = pinEl.value.trim();
        const errEl = document.getElementById('verify-error');
        hideError(errEl);
        try {
            await API.post('/api/account/verify', { pin });
            tryLoadAccount();
        } catch (err) {
            showError(errEl, err.detail || Lang.t('acct.verify.wrongPin'));
            pinEl.value = '';
            pinEl.focus();
        }
    }

    document.getElementById('btn-verify').addEventListener('click', doVerify);
    pinEl.addEventListener('keydown', e => { if (e.key === 'Enter') doVerify(); });
    pinEl.addEventListener('input', () => { if (pinEl.value.length === 4) setTimeout(doVerify, 150); });
}

function showQr(src) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;' +
        'display:flex;align-items:center;justify-content:center;cursor:pointer';
    overlay.innerHTML = `<img src="${src}" style="max-width:80vw;max-height:80vh;border-radius:8px;background:#fff;padding:14px;box-shadow:0 0 40px rgba(0,0,0,0.8)">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
    document.body.appendChild(overlay);
}

function renderAccount(data) {
    const balClass = data.balance_status === 'ok' ? 'balance-ok'
                   : data.balance_status === 'warn' ? 'balance-warn'
                   : 'balance-danger';
    const balHint  = data.balance_status === 'ok'  ? Lang.t('acct.canBorrow')
                   : data.balance_status === 'warn' ? Lang.t('acct.warnFunds', { min: data.borrow_min.toFixed(2) })
                   : Lang.t('acct.empty');

    const topupBtns = [1, 2, 5, 10, 20].map(a =>
        `<button class="btn topup-btn" data-amount="${a}">${a} €</button>`
    ).join('');

    const loansHtml = data.active_loans.length
        ? data.active_loans.map(l => {
            const overdue = l.overdue;
            return `
                <div class="loan-card${overdue ? ' loan-overdue' : ''}">
                    <div class="loan-card-info">
                        <div class="loan-card-title">
                            <a href="/book.html?isbn=${encodeURIComponent(l.book_isbn)}" style="color:inherit;text-decoration:none">${esc(l.book_title)}</a>
                        </div>
                    </div>
                    <div class="loan-card-right">
                        <div class="loan-card-due${overdue ? ' text-danger' : ''}">
                            ${overdue ? '⚠ ' : ''}${Lang.t('acct.due')} ${esc(fmtDate(l.due_date))}
                        </div>
                        ${overdue ? `<span class="overdue-badge">${Lang.t('return.overdue')}</span>` : ''}
                        <a href="/return.html?loan_id=${l.id}" class="btn btn-ghost btn-sm" style="margin-top:4px">${Lang.t('book.return')}</a>
                    </div>
                </div>
            `;
        }).join('')
        : `<div class="acct-empty">${Lang.t('acct.noLoans')}</div>`;

    const txnsHtml = data.recent_txns.length
        ? `<div class="txn-list">${data.recent_txns.map(t => {
            const cls = t.amount > 0 ? 'txn-credit' : t.amount < 0 ? 'txn-debit' : 'txn-neutral';
            const amtStr = t.amount !== 0
                ? (t.amount > 0 ? '+' : '') + t.amount.toFixed(2) + ' €'
                : '—';
            return `
                <div class="txn-row">
                    <span class="txn-date">${esc(fmtDate(t.created_at))}</span>
                    <div class="txn-desc">
                        <span class="txn-type">${esc(t.type)}</span>
                        <span class="txn-detail">${esc(t.description || '')}</span>
                    </div>
                    <span class="txn-amount ${cls}">${amtStr}</span>
                </div>
            `;
        }).join('')}</div>`
        : `<div class="acct-empty">${Lang.t('acct.noTxns')}</div>`;

    const langBtns = ['en', 'de', 'schwaebisch'].map(l =>
        `<button class="lang-btn${Lang.current===l?' active':''}" data-lang="${l}">${l === 'schwaebisch' ? 'Schwob' : l.toUpperCase()}</button>`
    ).join('');

    document.getElementById('main-content').innerHTML = `
        <div class="acct-page">
            <div class="lang-switcher-row">
                <span class="lang-switcher-label">${Lang.t('acct.language')}</span>
                <div class="lang-switcher">${langBtns}</div>
                <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="showQr('/user-qr/${data.id}.png')" title="Login QR">
                    <i class="fa-solid fa-qrcode" style="font-size:22px"></i>
                </button>
            </div>
            <div class="acct-body">
                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.balance')}</div>
                    <div class="balance-card ${balClass}">
                        <span class="balance-label">${Lang.t('acct.balance')}</span>
                        <span class="balance-amount">${data.guthaben.toFixed(2)} €</span>
                        <span class="balance-hint">${balHint}</span>
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.addFunds')}</div>
                    <div class="topup-form">
                        <div class="topup-hint">${Lang.t('acct.cashHint')}</div>
                        <div class="topup-presets">${topupBtns}</div>
                        <div id="topup-msg" style="font-size:13px;display:none"></div>
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.loans')}
                        ${data.active_loans.length ? `<span class="acct-count">${data.active_loans.length}</span>` : ''}
                    </div>
                    <div class="loan-list">${loansHtml}</div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.activity')}
                        ${data.recent_txns.length ? `<span class="acct-count">${data.recent_txns.length}</span>` : ''}
                    </div>
                    ${txnsHtml}
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.phone')}</div>
                    <div class="acct-qr-row">
                        <img class="acct-qr-img" src="/user-qr/${data.id}.png" alt="QR"
                             onerror="this.style.display='none'">
                        <span class="acct-qr-hint">${Lang.t('acct.qrHint')}</span>
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.settings')}</div>
                    <div style="display:flex;gap:12px;flex-wrap:wrap;padding:8px 0">
                        <a href="/change-pin.html" class="btn btn-ghost btn-sm">${Lang.t('acct.changePin')}</a>
                    </div>
                </div>
            </div>
        </div>
    `;

    document.querySelectorAll('.topup-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const amount = parseFloat(btn.dataset.amount);
            const msgEl  = document.getElementById('topup-msg');
            try {
                const res = await API.post('/api/account/topup', { amount });
                msgEl.className = 'text-success';
                msgEl.textContent = res.message;
                msgEl.style.display = 'block';
                setTimeout(() => tryLoadAccount(), 1500);
            } catch (err) {
                msgEl.className = 'text-danger';
                msgEl.textContent = err.detail || Lang.t('acct.addFunds');
                msgEl.style.display = 'block';
            }
        });
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            Lang.set(btn.dataset.lang);
            if (_cachedUser) renderNav(_cachedUser);
            if (_cachedAccountData) renderAccount(_cachedAccountData);
            await API.post(`/api/account/language/${btn.dataset.lang}`).catch(() => {});
        });
    });
}

async function init() {
    await Lang.load();
    _cachedUser = await initPage();
    tryLoadAccount();
}

init();
</script>
</body>
</html>

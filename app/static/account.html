<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MangaShelf — Account</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<header id="site-header" class="app-header"></header>
<main class="app-main" id="main-content"></main>

<script src="/static/js/api.js"></script>
<script src="/static/js/nav.js"></script>
<script src="/static/js/lang.js"></script>
<script src="/static/js/pin.js"></script>
<script>
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTxnType(t) {
    if (t.type === 'loan' && (t.description || '').includes('donor')) return Lang.t('txn.loanFree');
    return Lang.t('txn.' + t.type) || t.type;
}
function fmtTxnDetail(t) {
    if (t.type === 'entry_fee') return Lang.t('txn.entry_fee_detail');
    const m = (t.description || '').match(/^[^:]+:\s*(.+)$/);
    return m ? m[1] : (t.description || '');
}

let _cachedAccountData = null;
let _cachedUser = null;

async function tryLoadAccount() {
    try {
        const data = await API.get('/api/account');
        _cachedAccountData = data;
        renderAccount(data);
    } catch (err) {
        if (err.status === 403) {
            renderVerify();
        } else if (handleAuthError(err)) {
            // redirected
        } else {
            document.getElementById('main-content').innerHTML =
                `<p class="text-danger p-6">${esc(err.detail)}</p>`;
        }
    }
}

function renderVerify() {
    document.getElementById('main-content').innerHTML = `
        <div class="flex items-center justify-center flex-1">
            <div class="pin-card">
                <div class="pin-card-label" id="verify-label"></div>
                <div class="pin-card-user" id="verify-subtitle"></div>
                <div id="verify-error" class="pin-error" style="display:none;margin-bottom:8px"></div>
                <div id="verify-pin-step"></div>
            </div>
        </div>
    `;
    document.getElementById('verify-label').textContent    = Lang.t('acct.verify.title');
    document.getElementById('verify-subtitle').textContent = Lang.t('acct.verify.subtitle');

    const step = document.getElementById('verify-pin-step');
    const pf = makePinField(step, '', 4);

    const errEl = document.getElementById('verify-error');

    async function doVerify() {
        const pin = pf.getValue();
        errEl.style.display = 'none';
        try {
            await API.post('/api/account/verify', { pin });
            document.removeEventListener('keydown', keyHandler);
            tryLoadAccount();
        } catch (err) {
            errEl.textContent = err.detail || Lang.t('acct.verify.wrongPin');
            errEl.style.display = 'block';
            pf.reset();
        }
    }

    // Watch for 4 digits
    const obs = new MutationObserver(() => {
        if (pf.getValue().length === 4) { obs.disconnect(); setTimeout(doVerify, 200); }
    });
    obs.observe(step.querySelector('.pf-dots'), { subtree: true, attributes: true, attributeFilter: ['class'] });

    function keyHandler(e) {
        e.preventDefault(); e.stopPropagation();
        if (e.key === 'Escape') { document.removeEventListener('keydown', keyHandler); return; }
        if (/^\d$/.test(e.key) && pf.getValue().length < 4) {
            const btn = step.querySelector(`.pinpad-key[data-k="${e.key}"]`);
            if (btn) btn.dispatchEvent(new PointerEvent('pointerdown', { bubbles: true }));
        } else if (e.key === 'Backspace') {
            const btn = step.querySelector('.pinpad-key[data-k="back"]');
            if (btn) btn.dispatchEvent(new PointerEvent('pointerdown', { bubbles: true }));
        }
    }
    document.addEventListener('keydown', keyHandler);
}

function showQr(src) {
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `<img src="${src}" class="overlay-img">`;
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', handler); }
    });
    document.body.appendChild(overlay);
}

function renderAccount(data) {
    const balClass = data.balance_status === 'ok' ? 'balance-ok'
                   : data.balance_status === 'warn' ? 'balance-warn'
                   : 'balance-danger';
    const balHint  = data.balance_status === 'ok'  ? Lang.t('acct.canBorrow')
                   : data.balance_status === 'warn' ? Lang.t('acct.warnFunds', { min: fmtEur(data.borrow_min).replace(' €','') })
                   : Lang.t('acct.empty');

    const topupBtns = [1, 2, 5, 10, 20].map(a =>
        `<button class="btn btn-ghost topup-btn" data-amount="${a}">${a} €</button>`
    ).join('');

    const loansHtml = data.active_loans.length
        ? data.active_loans.map(l => {
            const overdue = l.overdue;
            return `
                <div class="loan-card${overdue ? ' loan-overdue' : ''}">
                    <div class="loan-card-info">
                        <div class="loan-card-title">
                            <a href="/index.html?q=${encodeURIComponent(l.book_isbn)}" class="link-plain">${esc(l.book_title)}</a>
                        </div>
                    </div>
                    <div class="loan-card-right">
                        <div class="loan-card-due${overdue ? ' text-danger' : ''}">
                            ${overdue ? '⚠ ' : ''}${Lang.t('acct.due')} ${esc(fmtDate(l.due_date))}
                        </div>
                        ${overdue ? `<span class="overdue-badge">${Lang.t('return.overdue')}</span>` : ''}
                        <span id="return-wrap-${l.id}">
                            <button class="btn btn-ghost btn-sm mt-1" onclick="confirmReturn(${l.id})">${Lang.t('book.return')}</button>
                        </span>
                    </div>
                </div>
            `;
        }).join('')
        : `<div class="acct-empty">${Lang.t('acct.noLoans')}</div>`;

    const txnsHtml = data.recent_txns.length
        ? `<div class="txn-list">${data.recent_txns.map(t => {
            const cls = t.amount > 0 ? 'txn-credit' : t.amount < 0 ? 'txn-debit' : 'txn-neutral';
            const amtStr = t.amount !== 0
                ? (t.amount > 0 ? '+' : '') + fmtEur(t.amount)
                : '—';
            return `
                <div class="txn-row">
                    <span class="txn-date">${esc(fmtDate(t.created_at))}</span>
                    <div class="txn-desc">
                        <span class="txn-type">${esc(fmtTxnType(t))}</span>
                        <span class="txn-detail">${esc(fmtTxnDetail(t))}</span>
                    </div>
                    <span class="txn-amount ${cls}">${amtStr}</span>
                </div>
            `;
        }).join('')}</div>`
        : `<div class="acct-empty">${Lang.t('acct.noTxns')}</div>`;

    const langBtns = ['en', 'de', 'schwaebisch'].map(l =>
        `<button class="lang-btn${Lang.current===l?' active':''}" data-lang="${l}">${l === 'schwaebisch' ? 'Schwob' : l.toUpperCase()}</button>`
    ).join('');

    document.getElementById('main-content').innerHTML = `
        <div class="acct-page">
            <div class="lang-switcher-row">
                <a href="/change-pin.html" class="btn btn-ghost btn-sm">${Lang.t('acct.changePin')}</a>
                <span class="lang-switcher-label ml-auto">${Lang.t('acct.language')}</span>
                <div class="lang-switcher">${langBtns}</div>
            </div>
            <div class="acct-body">
                <div class="flex items-stretch">
                    <div class="acct-section flex-1">
                        <div class="acct-section-title">${Lang.t('acct.balance')}</div>
                        <div class="balance-card ${balClass}">
                            <span class="balance-label">${Lang.t('acct.balance')}</span>
                            <span class="balance-amount">${fmtEur(data.guthaben)}</span>
                            <span class="balance-hint">${balHint}</span>
                        </div>
                    </div>
                    <div class="acct-section acct-qr-section"
                         onclick="showQr('/user-qr/${data.id}.png')">
                        <div class="acct-section-title">${Lang.t('acct.phone')}</div>
                        <img src="/user-qr/${data.id}.png" alt="QR" class="acct-qr-img"
                             onerror="this.style.display='none'">
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">${Lang.t('acct.addFunds')}</div>
                    <div class="topup-form">
                        <div class="topup-hint">${Lang.t('acct.cashHint')}</div>
                        <div class="topup-presets">${topupBtns}</div>
                        <div id="topup-msg" class="text-sm" style="display:none"></div>
                    </div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.loans')}
                        ${data.active_loans.length ? `<span class="acct-count">${data.active_loans.length}</span>` : ''}
                    </div>
                    <div class="loan-list">${loansHtml}</div>
                </div>

                <div class="acct-section">
                    <div class="acct-section-title">
                        ${Lang.t('acct.activity')}
                        ${data.recent_txns.length ? `<span class="acct-count">${data.recent_txns.length}</span>` : ''}
                    </div>
                    ${txnsHtml}
                </div>

            </div>
        </div>
    `;

    document.querySelectorAll('.topup-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            const amount = parseFloat(btn.dataset.amount);
            const msgEl  = document.getElementById('topup-msg');
            try {
                await API.post('/api/account/topup', { amount });
                let secs = 8;
                const undoId = 'topup-undo-btn';
                msgEl.className = 'text-success';
                msgEl.style.display = 'block';
                msgEl.innerHTML = `+${fmtEur(amount)} &nbsp;<button class="btn btn-ghost btn-sm" id="${undoId}">${Lang.t('acct.topupUndo')} (${secs})</button>`;
                const undoBtn = document.getElementById(undoId);
                const timer = setInterval(() => {
                    secs--;
                    if (secs <= 0) { clearInterval(timer); tryLoadAccount(); }
                    else { undoBtn.textContent = `${Lang.t('acct.topupUndo')} (${secs})`; }
                }, 1000);
                undoBtn.addEventListener('click', async () => {
                    clearInterval(timer);
                    try {
                        await API.post('/api/account/topup/undo');
                        msgEl.textContent = Lang.t('acct.topupUndone');
                        setTimeout(tryLoadAccount, 800);
                    } catch (e) {
                        msgEl.className = 'text-danger';
                        msgEl.textContent = e.detail || 'Failed';
                        setTimeout(tryLoadAccount, 1500);
                    }
                });
            } catch (err) {
                msgEl.className = 'text-danger';
                msgEl.textContent = err.detail || Lang.t('acct.addFunds');
                msgEl.style.display = 'block';
            }
        });
    });

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
            Lang.set(btn.dataset.lang);
            if (_cachedUser) renderNav(_cachedUser);
            if (_cachedAccountData) renderAccount(_cachedAccountData);
            await API.post(`/api/account/language/${btn.dataset.lang}`).catch(() => {});
        });
    });
}

function confirmReturn(loanId) {
    const wrap = document.getElementById(`return-wrap-${loanId}`);
    if (!wrap) return;
    wrap.innerHTML = `
        <span class="inline-flex items-center gap-1 mt-1">
            <span class="text-danger text-sm">${Lang.t('acct.confirmReturn')}</span>
            <button class="btn btn-ghost btn-sm" onclick="doReturn(${loanId})">${Lang.t('adminUsers.confirmYes')}</button>
            <button class="btn btn-ghost btn-sm" onclick="tryLoadAccount()">${Lang.t('adminUsers.confirmNo')}</button>
        </span>`;
}

async function doReturn(loanId) {
    try {
        await API.post(`/api/return/${loanId}`);
        tryLoadAccount();
    } catch (err) {
        const wrap = document.getElementById(`return-wrap-${loanId}`);
        if (wrap) wrap.innerHTML = `<span class="text-danger text-sm">${esc(err.detail || 'Failed')}</span>`;
    }
}

async function init() {
    await Lang.load();
    _cachedUser = await initPage();
    tryLoadAccount();
}

init();
</script>
</body>
</html>

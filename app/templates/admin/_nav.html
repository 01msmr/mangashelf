<div class="admin-section-label">{{ _t('admin.section') }}</div>
<nav class="admin-nav">
    <a href="{{ url_for('admin.users') }}"
       class="admin-nav-item {% if request.endpoint == 'admin.users' %}active{% endif %}">
        {{ _t('admin.users') }}
    </a>
    <a href="{{ url_for('admin.overdue') }}"
       class="admin-nav-item {% if request.endpoint == 'admin.overdue' %}active{% endif %}">
        {{ _t('admin.overdue') }}
        {% if g.overdue_count > 0 %}
            <span class="nav-badge">{{ g.overdue_count }}</span>
        {% endif %}
    </a>
    <a href="{{ url_for('admin.settings') }}"
       class="admin-nav-item {% if request.endpoint == 'admin.settings' %}active{% endif %}">
        {{ _t('admin.settings') }}
    </a>
    <a href="{{ url_for('admin.rebuy') }}"
       class="admin-nav-item {% if request.endpoint == 'admin.rebuy' %}active{% endif %}">
        {{ _t('admin.rebuy') }}
    </a>
</nav>

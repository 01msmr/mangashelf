{% extends 'base.html' %}
{% block title %}Change PIN — MangaStore{% endblock %}

{% block content %}
<div class="auth-page">

    <div class="hint-aside-row">
        <div class="auth-card">

            <div class="auth-title">Change <span>PIN</span></div>

            <form method="post" action="{{ url_for('account.change_pin') }}" class="auth-form">

                <div class="form-group">
                    <label class="form-label" for="current_pin">Current PIN</label>
                    <input class="form-input form-input-pin"
                           type="password"
                           id="current_pin"
                           name="current_pin"
                           placeholder="&#9679; &#9679; &#9679; &#9679;"
                           maxlength="4"
                           data-pin
                           data-pin-label="Current PIN"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pin">New PIN</label>
                    <input class="form-input form-input-pin"
                           type="password"
                           id="pin"
                           name="pin"
                           placeholder="&#9679; &#9679; &#9679; &#9679;"
                           maxlength="4"
                           data-pin
                           data-pin-label="New PIN"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="pin_confirm">Confirm New PIN</label>
                    <input class="form-input form-input-pin"
                           type="password"
                           id="pin_confirm"
                           name="pin_confirm"
                           placeholder="&#9679; &#9679; &#9679; &#9679;"
                           maxlength="4"
                           data-pin
                           data-pin-label="Confirm new PIN"
                           required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg mt-1">
                    Save New PIN
                </button>
            </form>
        </div>

        <div class="hint">
            Must be exactly 4 digits.<br><br>
            Must differ from your current PIN.
        </div>
    </div>

    <div class="auth-register-card">
        <a href="{{ url_for('account.account_page') }}">&larr; Cancel</a>
    </div>

</div>
{% endblock %}

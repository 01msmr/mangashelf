{% extends 'base.html' %}
{% block title %}My Account — Verify{% endblock %}

{% block content %}
<div class="auth-page">

    <div class="hint-aside-row">
        <div class="auth-card">

            <div class="auth-title">My <span>Account</span></div>

            <form method="post" action="{{ url_for('account.account_page') }}" class="auth-form">
                <div class="form-group">
                    <label class="form-label" for="pin">Your PIN</label>
                    <input class="form-input form-input-pin"
                           type="password"
                           id="pin"
                           name="pin"
                           placeholder="&#9679; &#9679; &#9679; &#9679;"
                           maxlength="4"
                           data-pin
                           data-pin-label="Enter your PIN"
                           required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg mt-1">
                    View Account
                </button>
            </form>
        </div>

        <div class="hint">
            This is a shared kiosk. Enter your PIN to access your personal account.
        </div>
    </div>

    <div class="auth-register-card">
        <a href="{{ url_for('books.scan') }}">&larr; Back to scan</a>
    </div>

</div>
{% endblock %}
